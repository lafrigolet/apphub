# ─────────────────────────────────────────────────────────────────
# Production override for docker-compose.yml.
#
# Use:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# What this changes vs. the default (dev) compose:
#   - Every portal builds with target=production (multi-stage → nginx-alpine).
#     RAM per portal drops from ~500 MB (vite dev) to ~10–20 MB (nginx static).
#   - Source bind mounts are removed — the static bundle is baked into the
#     image, so HMR is not possible (this is prod) and no live reloading.
#   - Vite-dev port mappings (5173–5177) are dropped from host. The frontal
#     gateway (nginx:8080) is the only public ingress; portals are reachable
#     internally on :80 over the docker network.
#   - The frontal gateway loads upstream.prod.conf instead of upstream.conf.
# ─────────────────────────────────────────────────────────────────

# Tagged image registry (consumido por `docker compose pull`). El
# workflow .github/workflows/deploy.yml setea IMAGE_TAG=<git-sha>;
# IMAGE_REGISTRY tiene que coincidir con el owner de GitHub donde se
# publican las imágenes. El operador lo fija en /opt/apphub/.env
# en producción.
#
# Cuando IMAGE_TAG no está setea (e.g. dev local que usa `--build`),
# Compose resuelve la imagen como `<prefix>:latest` y la regla `build:`
# sigue activa — así un `docker compose build` local mantiene su
# semántica habitual.

services:
  # ── AppHub admin portal (prod) ─────────────────────────────────
  portal:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-portal:${IMAGE_TAG:-latest}
    build:
      target: production
    ports: !reset []
    volumes: !reset []

  # ── Split Pay portal (prod) ────────────────────────────────────
  splitpay-portal:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-splitpay-portal:${IMAGE_TAG:-latest}
    build:
      target: production
      args:
        VITE_APP_ID: split-pay
        # Empty → portal calls /api/* relatively, the frontal nginx
        # routes it to the right backend by subdomain.
        VITE_API_BASE_URL: ''
    ports: !reset []
    volumes: !reset []

  # ── Aikikan portal (prod) ──────────────────────────────────────
  aikikan-portal:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-aikikan-portal:${IMAGE_TAG:-latest}
    build:
      target: production
    ports: !reset []
    volumes: !reset []

  # ── Voragine Console portal (prod) ─────────────────────────────
  voragine-console-portal:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-voragine-console-portal:${IMAGE_TAG:-latest}
    build:
      target: production
    ports: !reset []
    volumes: !reset []

  # ── Tenant Console portal (prod) ───────────────────────────────
  # Same flip as voragine-console: dev (vite) → prod (nginx-alpine
  # serving the built dist/). Healthcheck inherited from the Dockerfile.
  tenant-console-portal:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-tenant-console-portal:${IMAGE_TAG:-latest}
    build:
      target: production
    ports: !reset []
    volumes: !reset []

  # ── Backend monoliths + scheduler + aikikan-server ────────────
  # Estos no cambian de target entre dev/prod (siguen como Node), pero
  # en prod consumen la imagen publicada en lugar de buildear in-place.
  # volumes: !reset [] descarta los bind mounts de dev (./platform/*/src
  # y ./platform/*/migrations) que en prod TAPARÍAN el código bakeado en
  # la imagen con el árbol viejo del host (el deploy sólo sincroniza
  # docker-compose*.yml, infra/ y deploy/ — NO platform/).
  platform-core:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-platform-core:${IMAGE_TAG:-latest}
    volumes: !reset []

  platform-marketplace:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-platform-marketplace:${IMAGE_TAG:-latest}
    volumes: !reset []

  platform-restaurant:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-platform-restaurant:${IMAGE_TAG:-latest}
    volumes: !reset []

  platform-appointments:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-platform-appointments:${IMAGE_TAG:-latest}
    volumes: !reset []

  platform-scheduler:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-platform-scheduler:${IMAGE_TAG:-latest}
    volumes: !reset []

  aikikan-server:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-aikikan-server:${IMAGE_TAG:-latest}
    volumes: !reset []

  # ── Frontal gateway: swap to prod upstream definitions ─────────
  nginx:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-nginx:${IMAGE_TAG:-latest}
    volumes: !override
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d/upstream.prod.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ./infra/nginx/snippets:/etc/nginx/snippets:ro
    depends_on:
      redis:                   { condition: service_healthy }
      platform-core:           { condition: service_started }
      platform-marketplace:    { condition: service_started }
      platform-restaurant:     { condition: service_started }
      platform-appointments:   { condition: service_started }
      portal:                  { condition: service_started }
      splitpay-portal:         { condition: service_started }
      aikikan-portal:          { condition: service_started }
      voragine-console-portal: { condition: service_started }
      tenant-console-portal:   { condition: service_started }
