# ─────────────────────────────────────────────────────────────────
# Production override for docker-compose.yml.
#
# Use:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# What this changes vs. the default (dev) compose:
#   - Every portal builds with target=production (multi-stage → nginx-alpine).
#     RAM per portal drops from ~500 MB (vite dev) to ~10–20 MB (nginx static).
#   - Source bind mounts are removed — the static bundle is baked into the
#     image, so HMR is not possible (this is prod) and no live reloading.
#   - Vite-dev port mappings (5173–5177) are dropped from host. The frontal
#     gateway (nginx:8080) is the only public ingress; portals are reachable
#     internally on :80 over the docker network.
#   - The frontal gateway loads upstream.prod.conf instead of upstream.conf.
# ─────────────────────────────────────────────────────────────────

# Tagged image registry (consumido por `docker compose pull`). El
# workflow .github/workflows/deploy.yml setea IMAGE_TAG=<git-sha>;
# IMAGE_REGISTRY tiene que coincidir con el owner de GitHub donde se
# publican las imágenes. El operador lo fija en /opt/apphub/.env
# en producción.
#
# Cuando IMAGE_TAG no está setea (e.g. dev local que usa `--build`),
# Compose resuelve la imagen como `<prefix>:latest` y la regla `build:`
# sigue activa — así un `docker compose build` local mantiene su
# semántica habitual.

services:
  # ── Portals — contenedor unificado (prod, ADR 017) ────────────
  # nginx-alpine con los 9 dist/ servidos en los mismos puertos que los
  # vite dev servers (5173, 5175–5182): los upstreams del gateway no
  # cambian entre dev y prod. Sin puertos publicados al host — solo el
  # gateway llega por la red docker.
  portals:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-portals:${IMAGE_TAG:-latest}
    build:
      target: production
    ports: !reset []
    volumes: !reset []

  # ── Apps-servers (prod, ADR 018) ──────────────────────────────
  apps-servers:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-apps-servers:${IMAGE_TAG:-latest}
    build:
      target: production
    environment:
      NODE_ENV: production
    ports: !reset []
    volumes: !reset []

  # ── Infra: NO publicar puertos al host en prod ────────────────
  # En dev el compose base publica 5432/6379/9000/9001 al host para
  # comodidad del desarrollador (psql, redis-cli, consola MinIO en
  # localhost). En prod sería una superficie pública innecesaria —
  # las DB sólo deben ser accesibles vía la red docker `data`.
  # !reset [] descarta el listado heredado.
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  minio:
    ports: !reset []

  # ── Backend monoliths + scheduler + aikikan-server ────────────
  # Estos no cambian de target entre dev/prod (siguen como Node), pero
  # en prod consumen la imagen publicada en lugar de buildear in-place.
  # volumes: !reset [] descarta los bind mounts de dev (./platform/*/src
  # y ./platform/*/migrations) que en prod TAPARÍAN el código bakeado en
  # la imagen con el árbol viejo del host (el deploy sólo sincroniza
  # docker-compose*.yml, infra/ y deploy/ — NO platform/).
  platform-core:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-platform-core:${IMAGE_TAG:-latest}
    volumes: !reset []
    environment:
      # NODE_ENV stays 'development' in the base compose because dev mode
      # uses --watch + bind mounts. In prod, override so anything that
      # branches on it (logger format, email/sms/push stub gates, etc.)
      # behaves correctly.
      NODE_ENV: production
      # Public hostname suffix used when rendering nginx server blocks for new
      # apps / tenants (e.g. `aikikan.hulkstein.com`). Defaults to hulkstein.com
      # in dev; overridden here for the production domain.
      PLATFORM_PUBLIC_DOMAIN: hulkstein.com
      # Public base for the payments pay-link shortener: the QR encodes
      # https://hulkstein.com/api/payments/pay/<code> (302 → Stripe). Set only in
      # prod so the customer's phone can reach the redirect host; in dev it stays
      # unset and the QR carries the raw Stripe URL.
      PAYMENTS_PUBLIC_BASE_URL: https://hulkstein.com

  platform-scheduler:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-platform-scheduler:${IMAGE_TAG:-latest}
    volumes: !reset []
    environment:
      NODE_ENV: production

  # ── Frontal gateway: swap to prod upstream definitions ─────────
  nginx:
    image: ${IMAGE_REGISTRY:-ghcr.io/lafrigolet}/apphub-nginx:${IMAGE_TAG:-latest}
    # En prod nginx es el ingress público y bindea a :80 y :443 del host
    # (HTTP estándar + TLS para Cloudflare Full strict). En dev se queda
    # en :8080 sin TLS. !override evita que compose haga merge con el
    # listado de ports del base.
    ports: !override
      - '80:80'
      - '443:443'
    volumes: !override
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d/upstream.prod.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ./infra/nginx/snippets:/etc/nginx/snippets:ro
      # Overlay del stub dev → variante prod con `listen 443 ssl http2;`
      # + ssl_certificate. Esto activa TLS sin tocar los seeds ni los
      # templates dinámicos (incluyen tls-listen.conf por path).
      - ./infra/nginx/snippets/tls-listen.prod.conf:/etc/nginx/snippets/tls-listen.conf:ro
      # Hermano para el server block catch-all (nginx.conf) — añade un
      # `listen 443 ssl http2 default_server;` de modo que SNI desconocidos
      # devuelven 444 en lugar de caer en el primer server block :443
      # alfabético (lo que hacía que aikikan respondiera a aulavera).
      - ./infra/nginx/snippets/tls-listen-default.prod.conf:/etc/nginx/snippets/tls-listen-default.conf:ro
      # Cloudflare Origin Certificate (15-year ECDSA), generado en CF UI
      # y subido al host antes del primer arranque de prod con TLS.
      # cert.pem 0644, key.pem 0600.
      - /etc/cloudflare/origin:/etc/cloudflare/origin:ro
    depends_on:
      redis:                   { condition: service_healthy }
      platform-core:           { condition: service_started }
      portals:                 { condition: service_started }
      apps-servers:            { condition: service_started }
