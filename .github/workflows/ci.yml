name: CI

# CI = gate de pre-merge. Corre en PRs hacia main y en pushes a rama
# de integración `develop` (para validar trabajo en curso).
#
# Push a main NO dispara este workflow — esa rama la gestiona
# .github/workflows/deploy.yml, que ya construye los servicios
# afectados. La separación evita que un mismo push lance dos runs
# que hacen trabajo solapado.
on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: splitpay
          POSTGRES_PASSWORD: splitpay
          POSTGRES_DB: splitpay
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://splitpay:splitpay@localhost:5432/splitpay
          REDIS_URL: redis://localhost:6379
          PAYMENTS_STRIPE_SECRET_KEY: sk_test_placeholder
          PAYMENTS_STRIPE_WEBHOOK_SECRET: whsec_placeholder
          PAYMENTS_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          JWT_SECRET: ci_test_secret_at_least_32_chars_long

  docker:
    name: Docker build sanity (changed services only)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Detect changed services
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          chmod +x deploy/generate-matrix.sh
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          MATRIX=$(BASE_REF="$BASE" deploy/generate-matrix.sh)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Build (no push) changed images
        uses: docker/build-push-action@v5
        if: ${{ fromJSON(steps.changed.outputs.matrix).include[0] != null }}
        with:
          context: ${{ fromJSON(steps.changed.outputs.matrix).include[0].context }}
          push: false
          # Sanidad: solo construimos la primera entrada de la matriz —
          # CI ya valida lint+test+tipos, el build de PR es para detectar
          # roturas de Dockerfile. El deploy.yml es quien hace la matriz
          # completa con push.
          file: ${{ fromJSON(steps.changed.outputs.matrix).include[0].dockerfile }}
