services:
  # ── Infrastructure ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: splitpay
      POSTGRES_PASSWORD: splitpay
      POSTGRES_DB: splitpay
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U splitpay']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Platform Services (ports 3000–3005) ────────────────────────
  platform-auth:
    build:
      context: .
      dockerfile: platform/auth/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PLATFORM_AUTH_PORT: 3000
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      EXPECTED_APP_ID: platform
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./platform/auth/src:/app/platform/auth/src:ro
      - ./platform/auth/migrations:/app/platform/auth/migrations:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  platform-payments:
    build:
      context: .
      dockerfile: platform/payments/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      EXPECTED_APP_ID: platform
      PLATFORM_STRIPE_SECRET_KEY: ${PLATFORM_STRIPE_SECRET_KEY:-sk_test_placeholder}
      PLATFORM_STRIPE_WEBHOOK_SECRET: ${PLATFORM_STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./platform/payments/src:/app/platform/payments/src:ro
      - ./platform/payments/migrations:/app/platform/payments/migrations:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  platform-notifications:
    build:
      context: .
      dockerfile: platform/notifications/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      EXPECTED_APP_ID: platform
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@apphub.com}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./platform/notifications/src:/app/platform/notifications/src:ro
      - ./platform/notifications/migrations:/app/platform/notifications/migrations:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  platform-catalog:
    build:
      context: .
      dockerfile: platform/catalog/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      EXPECTED_APP_ID: platform
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./platform/catalog/src:/app/platform/catalog/src:ro
      - ./platform/catalog/migrations:/app/platform/catalog/migrations:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  platform-basket:
    build:
      context: .
      dockerfile: platform/basket/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3004:3004'
    environment:
      NODE_ENV: development
      PORT: 3004
      REDIS_URL: redis://redis:6379
      EXPECTED_APP_ID: platform
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./platform/basket/src:/app/platform/basket/src:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      redis: { condition: service_healthy }

  platform-tenant-config:
    build:
      context: .
      dockerfile: platform/tenant-config/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3005:3005'
    environment:
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      EXPECTED_APP_ID: platform
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./platform/tenant-config/src:/app/platform/tenant-config/src:ro
      - ./platform/tenant-config/migrations:/app/platform/tenant-config/migrations:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  # ── AppHub admin portal ────────────────────────────────────────
  portal:
    build:
      context: .
      dockerfile: ./apps/portal/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://apphub.local:8080
    volumes:
      - ./apps/portal/src:/app/apps/portal/src:ro
      - ./apps/portal/index.html:/app/apps/portal/index.html:ro

  # ── Yoga Studio (ports 3011–3017, frontend 5174) ───────────────
  yoga-auth:
    build:
      context: .
      dockerfile: apps/yoga-studio/yoga-auth/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3010:3010'
    environment:
      NODE_ENV: development
      YOGA_AUTH_PORT: 3010
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      YOGA_JWT_SECRET: ${YOGA_JWT_SECRET}
      YOGA_JWT_REFRESH_DAYS: 30
      YOGA_TENANT_ID: ${YOGA_TENANT_ID}
      YOGA_SUB_TENANT_ID: ${YOGA_SUB_TENANT_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./apps/yoga-studio/yoga-auth/src:/app/apps/yoga-studio/yoga-auth/src:ro
      - ./apps/yoga-studio/yoga-auth/migrations:/app/apps/yoga-studio/yoga-auth/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  yoga-users:
    build:
      context: .
      dockerfile: apps/yoga-studio/yoga-users/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3011:3011'
    environment:
      NODE_ENV: development
      YOGA_USERS_PORT: 3011
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      YOGA_JWT_SECRET: ${YOGA_JWT_SECRET}
      YOGA_TENANT_ID: ${YOGA_TENANT_ID}
      YOGA_SUB_TENANT_ID: ${YOGA_SUB_TENANT_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./apps/yoga-studio/yoga-users/src:/app/apps/yoga-studio/yoga-users/src:ro
      - ./apps/yoga-studio/yoga-users/migrations:/app/apps/yoga-studio/yoga-users/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  yoga-classes:
    build:
      context: .
      dockerfile: apps/yoga-studio/yoga-classes/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3012:3012'
    environment:
      NODE_ENV: development
      YOGA_CLASSES_PORT: 3012
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      YOGA_JWT_SECRET: ${YOGA_JWT_SECRET}
      YOGA_TENANT_ID: ${YOGA_TENANT_ID}
      YOGA_SUB_TENANT_ID: ${YOGA_SUB_TENANT_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./apps/yoga-studio/yoga-classes/src:/app/apps/yoga-studio/yoga-classes/src:ro
      - ./apps/yoga-studio/yoga-classes/migrations:/app/apps/yoga-studio/yoga-classes/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  yoga-bookings:
    build:
      context: .
      dockerfile: apps/yoga-studio/yoga-bookings/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3013:3013'
    environment:
      NODE_ENV: development
      YOGA_BOOKINGS_PORT: 3013
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      YOGA_JWT_SECRET: ${YOGA_JWT_SECRET}
      YOGA_BONUSES_INTERNAL_URL: http://yoga-bonuses:3014
      YOGA_CLASSES_INTERNAL_URL: http://yoga-classes:3012
      YOGA_TENANT_ID: ${YOGA_TENANT_ID}
      YOGA_SUB_TENANT_ID: ${YOGA_SUB_TENANT_ID:-}
      YOGA_CRON_DATABASE_URL: postgresql://svc_yoga_cron:yoga_cron_secret@postgres:5432/splitpay
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./apps/yoga-studio/yoga-bookings/src:/app/apps/yoga-studio/yoga-bookings/src:ro
      - ./apps/yoga-studio/yoga-bookings/migrations:/app/apps/yoga-studio/yoga-bookings/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  yoga-bonuses:
    build:
      context: .
      dockerfile: apps/yoga-studio/yoga-bonuses/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3014:3014'
    environment:
      NODE_ENV: development
      YOGA_BONUSES_PORT: 3014
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      YOGA_JWT_SECRET: ${YOGA_JWT_SECRET}
      YOGA_TENANT_ID: ${YOGA_TENANT_ID}
      YOGA_SUB_TENANT_ID: ${YOGA_SUB_TENANT_ID:-}
      YOGA_CRON_DATABASE_URL: postgresql://svc_yoga_cron:yoga_cron_secret@postgres:5432/splitpay
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./apps/yoga-studio/yoga-bonuses/src:/app/apps/yoga-studio/yoga-bonuses/src:ro
      - ./apps/yoga-studio/yoga-bonuses/migrations:/app/apps/yoga-studio/yoga-bonuses/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  yoga-payments:
    build:
      context: .
      dockerfile: apps/yoga-studio/yoga-payments/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3015:3015'
    environment:
      NODE_ENV: development
      YOGA_PAYMENTS_PORT: 3015
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      YOGA_JWT_SECRET: ${YOGA_JWT_SECRET}
      YOGA_STRIPE_SECRET_KEY: ${YOGA_STRIPE_SECRET_KEY}
      YOGA_STRIPE_WEBHOOK_SECRET: ${YOGA_STRIPE_WEBHOOK_SECRET}
      YOGA_TENANT_ID: ${YOGA_TENANT_ID}
      YOGA_SUB_TENANT_ID: ${YOGA_SUB_TENANT_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./apps/yoga-studio/yoga-payments/src:/app/apps/yoga-studio/yoga-payments/src:ro
      - ./apps/yoga-studio/yoga-payments/migrations:/app/apps/yoga-studio/yoga-payments/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  yoga-notifications:
    build:
      context: .
      dockerfile: apps/yoga-studio/yoga-notifications/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3016:3016'
    environment:
      NODE_ENV: development
      YOGA_NOTIFICATIONS_PORT: 3016
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      YOGA_JWT_SECRET: ${YOGA_JWT_SECRET}
      YOGA_SENDGRID_API_KEY: ${YOGA_SENDGRID_API_KEY}
      YOGA_SENDGRID_FROM_EMAIL: ${YOGA_SENDGRID_FROM_EMAIL:-noreply@yogastudio.com}
      YOGA_TENANT_ID: ${YOGA_TENANT_ID}
      YOGA_SUB_TENANT_ID: ${YOGA_SUB_TENANT_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./apps/yoga-studio/yoga-notifications/src:/app/apps/yoga-studio/yoga-notifications/src:ro
      - ./apps/yoga-studio/yoga-notifications/migrations:/app/apps/yoga-studio/yoga-notifications/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  yoga-reporting:
    build:
      context: .
      dockerfile: apps/yoga-studio/yoga-reporting/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3017:3017'
    environment:
      NODE_ENV: development
      YOGA_REPORTING_PORT: 3017
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      YOGA_JWT_SECRET: ${YOGA_JWT_SECRET}
      YOGA_TENANT_ID: ${YOGA_TENANT_ID}
      YOGA_SUB_TENANT_ID: ${YOGA_SUB_TENANT_ID:-}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./apps/yoga-studio/yoga-reporting/src:/app/apps/yoga-studio/yoga-reporting/src:ro
      - ./apps/yoga-studio/yoga-reporting/migrations:/app/apps/yoga-studio/yoga-reporting/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  yoga-portal:
    build:
      context: .
      dockerfile: apps/yoga-studio/yoga-portal/Dockerfile
      target: development
    ports:
      - '5174:5174'
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://yoga.apphub.local:8080
    volumes:
      - ./apps/yoga-studio/yoga-portal/src:/app/apps/yoga-studio/yoga-portal/src:ro
    depends_on:
      - yoga-auth
      - yoga-classes

  # ── Split Pay (port 3020, frontend 5175) ───────────────────────
  splitpay-core:
    build:
      context: .
      dockerfile: apps/split-pay/splitpay-core/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3020:3020'
    environment:
      NODE_ENV: development
      PORT: 3020
      DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      SPLITPAY_STRIPE_SECRET_KEY: ${PAYMENTS_STRIPE_SECRET_KEY:-sk_test_placeholder}
      SPLITPAY_STRIPE_PUBLISHABLE_KEY: ${PAYMENTS_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      SPLITPAY_STRIPE_WEBHOOK_SECRET: ${PAYMENTS_STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      SPLITPAY_STRIPE_PLATFORM_ACCOUNT_ID: ${PAYMENTS_STRIPE_PLATFORM_ACCOUNT_ID:-}
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      EXPECTED_APP_ID: split-pay
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./apps/split-pay/splitpay-core/src:/app/apps/split-pay/splitpay-core/src:ro
      - ./apps/split-pay/splitpay-core/migrations:/app/apps/split-pay/splitpay-core/migrations:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  splitpay-portal:
    build:
      context: .
      dockerfile: ./apps/split-pay/splitpay-portal/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '5175:5175'
    environment:
      NODE_ENV: development
      VITE_APP_ID: split-pay
      VITE_API_BASE_URL: http://splitpay.apphub.local:8080
    volumes:
      - ./apps/split-pay/splitpay-portal/src:/app/src:ro
    depends_on:
      - platform-auth
      - splitpay-core

  # ── Gateway ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/snippets:/etc/nginx/snippets:ro
    depends_on:
      - platform-auth
      - platform-payments
      - platform-notifications
      - platform-catalog
      - platform-basket
      - platform-tenant-config
      - portal
      - yoga-auth
      - yoga-users
      - yoga-classes
      - yoga-bookings
      - yoga-bonuses
      - yoga-payments
      - yoga-notifications
      - yoga-reporting
      - yoga-portal
      - splitpay-core
      - splitpay-portal

volumes:
  postgres_data:
  redis_data:
