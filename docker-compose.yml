services:
  # ── Infrastructure ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [data]
    environment:
      POSTGRES_USER: splitpay
      POSTGRES_PASSWORD: splitpay
      POSTGRES_DB: splitpay
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U splitpay']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [data]
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO — S3-compatible object store ────────────────────────
  # Used by platform-core's storage module to host all binary assets:
  # menu photos, signatures, dispute evidence, telehealth recordings, etc.
  # In production, swap S3_ENDPOINT for AWS S3 / Cloudflare R2 / Backblaze B2.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    restart: unless-stopped
    networks: [data]
    ports:
      - '9000:9000'    # S3 API
      - '9001:9001'    # web console (admin)
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-apphub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-apphub_minio_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'mc ready local || curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3

  # One-shot: creates the apphub bucket on first boot. Safe to re-run.
  minio-init:
    image: minio/mc:latest
    networks: [data]
    depends_on:
      minio: { condition: service_healthy }
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-apphub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-apphub_minio_secret}
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/apphub &&
        mc anonymous set none local/apphub &&
        echo 'minio-init: bucket apphub ready'
      "

  # ── Platform Core (modular monolith — port 3000) ───────────────
  # Hosts all horizontal modules (auth today; payments, notifications, catalog,
  # basket, tenant-config, subscriptions to follow). Each module keeps its own
  # DB role and schema; one Pool per module is created inside the same process.
  platform-core:
    build:
      context: .
      dockerfile: platform/core/Dockerfile
      target: development
    restart: unless-stopped
    networks: [app, data]
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PLATFORM_CORE_PORT: 3000
      MIGRATION_DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      # Master key for AES-256-GCM at-rest encryption of module config
      # secrets stored in platform_*/config tables (auth oauth_client_secret,
      # Stripe keys, Resend api key, S3 access keys, etc.).
      PLATFORM_CONFIG_ENCRYPTION_KEY: ${PLATFORM_CONFIG_ENCRYPTION_KEY}
      EXPECTED_APP_ID: platform
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      # Dev/CI headroom: parallel integration suites all hit this one auth
      # server. Prod leaves RATE_LIMIT_MAX unset → conservative 30/min default.
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-2000}
      # Per-module DATABASE_URLs — one Pool per module
      DATABASE_URL_AUTH:          postgresql://svc_platform_auth:platform_auth_secret@postgres:5432/splitpay
      DATABASE_URL_NOTIFICATIONS: postgresql://svc_platform_notifications:platform_notifications_secret@postgres:5432/splitpay
      DATABASE_URL_PAYMENTS:      postgresql://splitpay:splitpay@postgres:5432/splitpay
      DATABASE_URL_TENANT_CONFIG: postgresql://splitpay:splitpay@postgres:5432/splitpay
      DATABASE_URL_SPLITPAY:      postgresql://splitpay:splitpay@postgres:5432/splitpay
      DATABASE_URL_STORAGE:       postgresql://svc_platform_storage:platform_storage_secret@postgres:5432/splitpay
      DATABASE_URL_LEADS:         postgresql://svc_platform_leads:platform_leads_secret@postgres:5432/splitpay
      DATABASE_URL_DONATIONS:     postgresql://svc_platform_donations:platform_donations_secret@postgres:5432/splitpay
      DATABASE_URL_INQUIRIES:     postgresql://svc_platform_inquiries:platform_inquiries_secret@postgres:5432/splitpay
      DATABASE_URL_VERIFACTU:     postgresql://svc_platform_verifactu:platform_verifactu_secret@postgres:5432/splitpay
      DATABASE_URL_CHAT:          postgresql://svc_platform_chat:platform_chat_secret@postgres:5432/splitpay
      DATABASE_URL_TPV:           postgresql://svc_platform_tpv:platform_tpv_secret@postgres:5432/splitpay
      PLATFORM_CORE_BASE_URL:     http://platform-core:3000
      # Storage module — S3-compatible object store (MinIO in dev, AWS S3/R2 in prod)
      S3_ENDPOINT:         ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION:           ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY:       ${MINIO_ROOT_USER:-apphub}
      S3_SECRET_KEY:       ${MINIO_ROOT_PASSWORD:-apphub_minio_secret}
      S3_BUCKET:           ${S3_BUCKET:-apphub}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # Public-facing endpoint that the FRONTEND uses to PUT bytes. In dev,
      # the browser hits localhost:9000 directly because it can't resolve
      # 'minio' inside the docker network.
      S3_PUBLIC_ENDPOINT:  ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      # OAuth credentials forwarded to the auth module
      GOOGLE_CLIENT_ID:    ${GOOGLE_CLIENT_ID:-}
      FACEBOOK_APP_ID:     ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      # Notifications module
      RESEND_API_KEY:      ${RESEND_API_KEY:-}
      EMAIL_FROM_ADDRESS:  ${EMAIL_FROM_ADDRESS:-noreply@hulkstein.local}
      # Buzón de operaciones para alertas internas a staff (disputes SLA,
      # leads sin contactar/estancados/follow-up sin owner). Vacío → no-op.
      STAFF_OPS_EMAIL:     ${STAFF_OPS_EMAIL:-}
      # Payments module — Stripe
      PLATFORM_STRIPE_SECRET_KEY:     ${PLATFORM_STRIPE_SECRET_KEY:-sk_test_placeholder}
      PLATFORM_STRIPE_WEBHOOK_SECRET: ${PLATFORM_STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      # Splitpay module — Stripe Connect
      SPLITPAY_STRIPE_SECRET_KEY:          ${PAYMENTS_STRIPE_SECRET_KEY:-sk_test_placeholder}
      SPLITPAY_STRIPE_PUBLISHABLE_KEY:     ${PAYMENTS_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      SPLITPAY_STRIPE_WEBHOOK_SECRET:      ${PAYMENTS_STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      SPLITPAY_STRIPE_PLATFORM_ACCOUNT_ID: ${PAYMENTS_STRIPE_PLATFORM_ACCOUNT_ID:-}
    volumes:
      - ./platform/core/src:/app/platform/core/src:ro
      - ./platform/auth/src:/app/platform/auth/src:ro
      - ./platform/auth/migrations:/app/platform/auth/migrations:ro
      - ./platform/notifications/src:/app/platform/notifications/src:ro
      - ./platform/notifications/migrations:/app/platform/notifications/migrations:ro
      - ./platform/payments/src:/app/platform/payments/src:ro
      - ./platform/payments/migrations:/app/platform/payments/migrations:ro
      - ./platform/tenant-config/src:/app/platform/tenant-config/src:ro
      - ./platform/tenant-config/migrations:/app/platform/tenant-config/migrations:ro
      - ./platform/splitpay/src:/app/platform/splitpay/src:ro
      - ./platform/splitpay/migrations:/app/platform/splitpay/migrations:ro
      - ./platform/storage/src:/app/platform/storage/src:ro
      - ./platform/storage/migrations:/app/platform/storage/migrations:ro
      - ./platform/donations/src:/app/platform/donations/src:ro
      - ./platform/donations/migrations:/app/platform/donations/migrations:ro
      - ./platform/tpv/src:/app/platform/tpv/src:ro
      - ./platform/tpv/migrations:/app/platform/tpv/migrations:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      postgres:    { condition: service_healthy }
      redis:       { condition: service_healthy }
      minio:       { condition: service_healthy }
      minio-init:  { condition: service_completed_successfully }

  # ── Platform Marketplace (modular monolith — port 3100) ─────────
  # Hosts marketplace modules (orders, inventory, reviews, messaging,
  # shipping, disputes). Communicates with platform-core via Redis events
  # and shared PLATFORM_JWT_SECRET (so JWTs issued by auth on platform-core
  # are accepted here without round-trip).
  platform-marketplace:
    build:
      context: .
      dockerfile: platform/marketplace/Dockerfile
      target: development
    restart: unless-stopped
    networks: [app, data]
    ports:
      - '3100:3100'
    environment:
      NODE_ENV: development
      PLATFORM_MARKETPLACE_PORT: 3100
      MIGRATION_DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      EXPECTED_APP_ID: platform
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      PLATFORM_CORE_URL: http://platform-core:3000
      # Decrypts module config secrets at rest (shipping carrier credentials:
      # easypost_api_key, carrier webhook HMAC secrets). AES-256-GCM master key.
      PLATFORM_CONFIG_ENCRYPTION_KEY: ${PLATFORM_CONFIG_ENCRYPTION_KEY}
      # EasyPost (shipping outbound rate-shop/labels/pickups) — DB-backed config
      # (easypost_api_key) is primary; this env is a dev/local fallback only.
      EASYPOST_API_KEY: ${EASYPOST_API_KEY:-}
      # S3/MinIO for archiving carrier label PDFs (shipping → platform/storage).
      # Optional: absent → labels still purchase, we keep the carrier-hosted URL.
      S3_ENDPOINT:         ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION:           ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY:       ${MINIO_ROOT_USER:-apphub}
      S3_SECRET_KEY:       ${MINIO_ROOT_PASSWORD:-apphub_minio_secret}
      S3_BUCKET:           ${S3_BUCKET:-apphub}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # Per-module DATABASE_URLs — one Pool per module, each with its dedicated DB role
      DATABASE_URL_ORDERS:    postgresql://svc_platform_orders:platform_orders_secret@postgres:5432/splitpay
      DATABASE_URL_INVENTORY: postgresql://svc_platform_inventory:platform_inventory_secret@postgres:5432/splitpay
      DATABASE_URL_REVIEWS:   postgresql://svc_platform_reviews:platform_reviews_secret@postgres:5432/splitpay
      DATABASE_URL_MESSAGING: postgresql://svc_platform_messaging:platform_messaging_secret@postgres:5432/splitpay
      DATABASE_URL_SHIPPING:  postgresql://svc_platform_shipping:platform_shipping_secret@postgres:5432/splitpay
      DATABASE_URL_DISPUTES:  postgresql://svc_platform_disputes:platform_disputes_secret@postgres:5432/splitpay
      DATABASE_URL_CATALOG:   postgresql://svc_platform_catalog:platform_catalog_secret@postgres:5432/splitpay
      # basket is Redis-only; no DATABASE_URL_BASKET needed
    volumes:
      - ./platform/marketplace/src:/app/platform/marketplace/src:ro
      - ./platform/orders/src:/app/platform/orders/src:ro
      - ./platform/orders/migrations:/app/platform/orders/migrations:ro
      - ./platform/inventory/src:/app/platform/inventory/src:ro
      - ./platform/inventory/migrations:/app/platform/inventory/migrations:ro
      - ./platform/reviews/src:/app/platform/reviews/src:ro
      - ./platform/reviews/migrations:/app/platform/reviews/migrations:ro
      - ./platform/messaging/src:/app/platform/messaging/src:ro
      - ./platform/messaging/migrations:/app/platform/messaging/migrations:ro
      - ./platform/shipping/src:/app/platform/shipping/src:ro
      - ./platform/shipping/migrations:/app/platform/shipping/migrations:ro
      - ./platform/disputes/src:/app/platform/disputes/src:ro
      - ./platform/disputes/migrations:/app/platform/disputes/migrations:ro
      - ./platform/catalog/src:/app/platform/catalog/src:ro
      - ./platform/catalog/migrations:/app/platform/catalog/migrations:ro
      - ./platform/basket/src:/app/platform/basket/src:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }


  # ── Platform-restaurant: menu + reservations + floor-plan + kds + pos + delivery-dispatch ──
  platform-restaurant:
    build:
      context: .
      dockerfile: platform/restaurant/Dockerfile
      target: development
    restart: unless-stopped
    networks: [app, data]
    ports:
      - '3200:3200'
    environment:
      NODE_ENV: development
      PLATFORM_RESTAURANT_PORT: 3200
      MIGRATION_DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      EXPECTED_APP_ID: platform
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      PLATFORM_CORE_URL: http://platform-core:3000
      PLATFORM_MARKETPLACE_URL: http://platform-marketplace:3100
      # Per-module DATABASE_URLs — one Pool per module, each with its dedicated DB role
      DATABASE_URL_MENU:              postgresql://svc_platform_menu:platform_menu_secret@postgres:5432/splitpay
      DATABASE_URL_RESERVATIONS:      postgresql://svc_platform_reservations:platform_reservations_secret@postgres:5432/splitpay
      DATABASE_URL_FLOOR_PLAN:        postgresql://svc_platform_floor_plan:platform_floor_plan_secret@postgres:5432/splitpay
      DATABASE_URL_KDS:               postgresql://svc_platform_kds:platform_kds_secret@postgres:5432/splitpay
      DATABASE_URL_POS:               postgresql://svc_platform_pos:platform_pos_secret@postgres:5432/splitpay
      DATABASE_URL_DELIVERY_DISPATCH: postgresql://svc_platform_delivery_dispatch:platform_delivery_dispatch_secret@postgres:5432/splitpay
    volumes:
      - ./platform/restaurant/src:/app/platform/restaurant/src:ro
      - ./platform/menu/src:/app/platform/menu/src:ro
      - ./platform/menu/migrations:/app/platform/menu/migrations:ro
      - ./platform/reservations/src:/app/platform/reservations/src:ro
      - ./platform/reservations/migrations:/app/platform/reservations/migrations:ro
      - ./platform/floor-plan/src:/app/platform/floor-plan/src:ro
      - ./platform/floor-plan/migrations:/app/platform/floor-plan/migrations:ro
      - ./platform/kds/src:/app/platform/kds/src:ro
      - ./platform/kds/migrations:/app/platform/kds/migrations:ro
      - ./platform/pos/src:/app/platform/pos/src:ro
      - ./platform/pos/migrations:/app/platform/pos/migrations:ro
      - ./platform/delivery-dispatch/src:/app/platform/delivery-dispatch/src:ro
      - ./platform/delivery-dispatch/migrations:/app/platform/delivery-dispatch/migrations:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }


  # ── Platform-appointments: services + resources + bookings + availability + intake-forms + telehealth + packages + practitioner-payouts ──
  platform-appointments:
    build:
      context: .
      dockerfile: platform/appointments/Dockerfile
      target: development
    restart: unless-stopped
    networks: [app, data]
    ports:
      - '3300:3300'
    environment:
      NODE_ENV: development
      PLATFORM_APPOINTMENTS_PORT: 3300
      MIGRATION_DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      EXPECTED_APP_ID: platform
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      PLATFORM_CORE_URL: http://platform-core:3000
      PLATFORM_MARKETPLACE_URL: http://platform-marketplace:3100
      DATABASE_URL_SERVICES:             postgresql://svc_platform_services:platform_services_secret@postgres:5432/splitpay
      DATABASE_URL_RESOURCES:            postgresql://svc_platform_resources:platform_resources_secret@postgres:5432/splitpay
      DATABASE_URL_BOOKINGS:             postgresql://svc_platform_bookings:platform_bookings_secret@postgres:5432/splitpay
      DATABASE_URL_AVAILABILITY:         postgresql://svc_platform_availability:platform_availability_secret@postgres:5432/splitpay
      DATABASE_URL_INTAKE_FORMS:         postgresql://svc_platform_intake_forms:platform_intake_forms_secret@postgres:5432/splitpay
      DATABASE_URL_TELEHEALTH:           postgresql://svc_platform_telehealth:platform_telehealth_secret@postgres:5432/splitpay
      DATABASE_URL_PACKAGES:             postgresql://svc_platform_packages:platform_packages_secret@postgres:5432/splitpay
      DATABASE_URL_PRACTITIONER_PAYOUTS: postgresql://svc_platform_practitioner_payouts:platform_practitioner_payouts_secret@postgres:5432/splitpay
    volumes:
      - ./platform/appointments/src:/app/platform/appointments/src:ro
      - ./platform/services/src:/app/platform/services/src:ro
      - ./platform/services/migrations:/app/platform/services/migrations:ro
      - ./platform/resources/src:/app/platform/resources/src:ro
      - ./platform/resources/migrations:/app/platform/resources/migrations:ro
      - ./platform/bookings/src:/app/platform/bookings/src:ro
      - ./platform/bookings/migrations:/app/platform/bookings/migrations:ro
      - ./platform/availability/src:/app/platform/availability/src:ro
      - ./platform/availability/migrations:/app/platform/availability/migrations:ro
      - ./platform/intake-forms/src:/app/platform/intake-forms/src:ro
      - ./platform/intake-forms/migrations:/app/platform/intake-forms/migrations:ro
      - ./platform/telehealth/src:/app/platform/telehealth/src:ro
      - ./platform/telehealth/migrations:/app/platform/telehealth/migrations:ro
      - ./platform/packages/src:/app/platform/packages/src:ro
      - ./platform/packages/migrations:/app/platform/packages/migrations:ro
      - ./platform/practitioner-payouts/src:/app/platform/practitioner-payouts/src:ro
      - ./platform/practitioner-payouts/migrations:/app/platform/practitioner-payouts/migrations:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }


  # ── Platform-scheduler: cron runner for the 4 monoliths ─────────
  # ── Portals — contenedor unificado de los 9 frontends (ADR 017) ──
  # dev: 9 procesos vite (HMR intacto) lanzados por dev-entrypoint.sh,
  # cada uno en su puerto histórico y con su VITE_* propio (per-proceso).
  # prod (override): nginx-alpine sirviendo los dist/ en los MISMOS
  # puertos — los upstreams del gateway no cambian entre dev y prod.
  portals:
    build:
      context: .
      dockerfile: infra/portals/Dockerfile
      target: development
    restart: unless-stopped
    networks: [edge]
    ports:
      - '5173:5173'
      - '5175:5175'
      - '5176:5176'
      - '5177:5177'
      - '5178:5178'
      - '5179:5179'
      - '5180:5180'
      - '5181:5181'
      - '5182:5182'
      - '5183:5183'
    environment:
      NODE_ENV: development
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      AIKIKAN_TENANT_ID: ${AIKIKAN_TENANT_ID:-}
    volumes:
      - ./apps/portal/src:/app/apps/portal/src:ro
      - ./apps/portal/index.html:/app/apps/portal/index.html:ro
      - ./apps/split-pay/splitpay-portal/src:/app/apps/split-pay/splitpay-portal/src:ro
      - ./apps/aikikan/aikikan-portal/src:/app/apps/aikikan/aikikan-portal/src:ro
      - ./apps/aikikan/aikikan-portal/public:/app/apps/aikikan/aikikan-portal/public:ro
      - ./apps/console/console-portal/src:/app/apps/console/console-portal/src:ro
      - ./apps/console/console-portal/vite.config.js:/app/apps/console/console-portal/vite.config.js:ro
      - ./apps/console/console-portal/index.html:/app/apps/console/console-portal/index.html:ro
      - ./apps/tenant-console/tenant-console-portal/src:/app/apps/tenant-console/tenant-console-portal/src:ro
      - ./apps/tenant-console/tenant-console-portal/vite.config.js:/app/apps/tenant-console/tenant-console-portal/vite.config.js:ro
      - ./apps/tenant-console/tenant-console-portal/index.html:/app/apps/tenant-console/tenant-console-portal/index.html:ro
      - ./apps/aulavera/aulavera-portal/src:/app/apps/aulavera/aulavera-portal/src:ro
      - ./apps/aulavera/aulavera-portal/vite.config.js:/app/apps/aulavera/aulavera-portal/vite.config.js:ro
      - ./apps/aulavera/aulavera-portal/index.html:/app/apps/aulavera/aulavera-portal/index.html:ro
      - ./apps/js-electric/js-electric-portal/src:/app/apps/js-electric/js-electric-portal/src:ro
      - ./apps/js-electric/js-electric-portal/vite.config.js:/app/apps/js-electric/js-electric-portal/vite.config.js:ro
      - ./apps/js-electric/js-electric-portal/index.html:/app/apps/js-electric/js-electric-portal/index.html:ro
      - ./apps/js-electric/js-electric-portal/tailwind.config.js:/app/apps/js-electric/js-electric-portal/tailwind.config.js:ro
      - ./apps/js-electric/js-electric-portal/postcss.config.js:/app/apps/js-electric/js-electric-portal/postcss.config.js:ro
      - ./apps/macabeo/macabeo-portal/src:/app/apps/macabeo/macabeo-portal/src:ro
      - ./apps/macabeo/macabeo-portal/vite.config.js:/app/apps/macabeo/macabeo-portal/vite.config.js:ro
      - ./apps/macabeo/macabeo-portal/index.html:/app/apps/macabeo/macabeo-portal/index.html:ro
      - ./apps/macabeo/macabeo-portal/tailwind.config.js:/app/apps/macabeo/macabeo-portal/tailwind.config.js:ro
      - ./apps/macabeo/macabeo-portal/postcss.config.js:/app/apps/macabeo/macabeo-portal/postcss.config.js:ro
      - ./apps/verifactu/verifactu-portal/src:/app/apps/verifactu/verifactu-portal/src:ro
      - ./apps/verifactu/verifactu-portal/vite.config.js:/app/apps/verifactu/verifactu-portal/vite.config.js:ro
      - ./apps/verifactu/verifactu-portal/index.html:/app/apps/verifactu/verifactu-portal/index.html:ro
      - ./apps/verifactu/verifactu-portal/tailwind.config.js:/app/apps/verifactu/verifactu-portal/tailwind.config.js:ro
      - ./apps/verifactu/verifactu-portal/postcss.config.js:/app/apps/verifactu/verifactu-portal/postcss.config.js:ro
      - ./apps/tpv/tpv-portal/src:/app/apps/tpv/tpv-portal/src:ro
      - ./apps/tpv/tpv-portal/index.html:/app/apps/tpv/tpv-portal/index.html:ro
      - ./apps/tpv/tpv-portal/vite.config.js:/app/apps/tpv/tpv-portal/vite.config.js:ro

  platform-scheduler:
    build:
      context: .
      dockerfile: platform/scheduler/Dockerfile
      target: development
    restart: unless-stopped
    networks: [data]
    # No public port mapping — the admin endpoints are reached via the
    # internal docker network from console. Exposing 3400 is OK in
    # dev for curl checks but not strictly needed.
    ports:
      - '3400:3400'
    environment:
      NODE_ENV: development
      PLATFORM_SCHEDULER_PORT: 3400
      DATABASE_URL: postgresql://svc_platform_scheduler:platform_scheduler_secret@postgres:5432/splitpay
      MIGRATION_DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      EXPECTED_APP_ID: platform
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./platform/scheduler/src:/app/platform/scheduler/src:ro
      - ./platform/scheduler/migrations:/app/platform/scheduler/migrations:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro
    depends_on:
      postgres:              { condition: service_healthy }
      redis:                 { condition: service_healthy }
      platform-core:         { condition: service_started }
      platform-marketplace:  { condition: service_started }
      platform-restaurant:   { condition: service_started }
      platform-appointments: { condition: service_started }


  # ── Apps-servers — orquestador de app-servers (puerto 3030, ADR 018) ──
  # UN proceso Fastify hospeda todos los servidores específicos de app
  # (aikikan, aulavera, …) como módulos con guard de app_id POR SCOPE y un
  # Pool por app ligado a su rol svc_app_<app>. Cada app conserva su
  # server.js + Dockerfile como artefactos ready-to-split (ADR 016).
  # OJO: NO se define EXPECTED_APP_ID — el guard es por módulo.
  apps-servers:
    build:
      context: .
      dockerfile: apps/apps-servers/Dockerfile
      target: development
    restart: unless-stopped
    networks: [app, data]
    ports:
      - '3030:3030'
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      APPS_SERVERS_PORT: '3030'
      MIGRATION_DATABASE_URL: postgresql://splitpay:splitpay@postgres:5432/splitpay
      REDIS_URL: redis://redis:6379
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET}
      # Un Pool por app, cada uno con su rol dedicado
      DATABASE_URL_AIKIKAN:  postgresql://svc_app_aikikan:app_aikikan_secret@postgres:5432/splitpay
      DATABASE_URL_AULAVERA: postgresql://svc_app_aulavera:app_aulavera_secret@postgres:5432/splitpay
      # Pagos — aikikan delega en `splitpay` (módulo de platform-core).
      # Stripe credentials viven en splitpay; aikikan solo necesita la URL
      # interna del platform-core para crear sesiones por loopback HTTP.
      SPLITPAY_BASE_URL:  http://platform-core:3000
      PLATFORM_CORE_URL:  http://platform-core:3000
      AIKIKAN_PUBLIC_URL: ${AIKIKAN_PUBLIC_URL:-http://aikikan.hulkstein.local:8080}
      AULAVERA_PUBLIC_URL: ${AULAVERA_PUBLIC_URL:-http://aulavera.hulkstein.local:8080}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./apps/apps-servers/src:/app/apps/apps-servers/src:ro
      - ./apps/aikikan/aikikan-server/src:/app/apps/aikikan/aikikan-server/src:ro
      - ./apps/aikikan/aikikan-server/migrations:/app/apps/aikikan/aikikan-server/migrations:ro
      - ./apps/aulavera/aulavera-server/src:/app/apps/aulavera/aulavera-server/src:ro
      - ./apps/aulavera/aulavera-server/migrations:/app/apps/aulavera/aulavera-server/migrations:ro
      - ./packages/platform-sdk/src:/app/packages/platform-sdk/src:ro

  # ── Gateway ────────────────────────────────────────────────────
  # Custom image: NGINX + redis-cli + sidecar that hydrates per-subdomain
  # server blocks from a Redis hash and reloads nginx within ~2s of any
  # change. See infra/nginx/sidecar.sh for the polling/reconciliation logic.
  nginx:
    build:
      # Context = repo root para que coincida con el workflow de CI/CD
      # (que usa `context: .` uniforme para todos los servicios). El
      # Dockerfile referencia sus assets con `infra/nginx/<file>`.
      context: .
      dockerfile: infra/nginx/Dockerfile
    restart: unless-stopped
    networks: [edge, app, data]
    ports:
      - '8080:80'
    environment:
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      # Tunable: how often the sidecar polls Redis (seconds)
      POLL_INTERVAL: '2'
    volumes:
      # Static infrastructure: nginx.conf, the upstream definitions and the
      # shared snippets/. Per-subdomain server blocks come from Redis at
      # runtime — NOT from a host bind mount. /etc/nginx/conf.d/sites/ is
      # populated by the sidecar inside the container.
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ./infra/nginx/snippets:/etc/nginx/snippets:ro
    depends_on:
      redis: { condition: service_healthy }
      platform-core:           { condition: service_started }
      platform-marketplace:    { condition: service_started }
      platform-restaurant:     { condition: service_started }
      platform-appointments:   { condition: service_started }
      portals:                 { condition: service_started }
      apps-servers:            { condition: service_started }

volumes:
  postgres_data:
  redis_data:
  minio_data:

# ─────────────────────────────────────────────────────────────────
# DMZ lógica: tres redes Docker que segmentan el tráfico por tier.
# Cada container se enrola sólo en las redes que necesita; los que
# no lo hacen no pueden hablarse, ni siquiera por DNS interno.
#
#   edge  — Internet (vía nginx) ↔ frontal nginx + portales static.
#           NO contiene postgres/redis/minio.
#   app   — nginx ↔ Fastify monoliths ↔ entre monoliths (HTTP).
#           Permite egreso a Internet para Stripe / Resend / etc.
#   data  — Fastify monoliths + scheduler ↔ postgres / redis / minio.
#           `internal: true` bloquea egreso a Internet — defense
#           in depth: si comprometen postgres/redis/minio o un
#           backend que sólo está en data, no puede exfiltrar.
#
# Quién está en cada red:
#                          edge  app  data
#   nginx                    ✓    ✓    ✓   (sidecar lee redis configs)
#   portal/*-portal          ✓
#   platform-core/-mkt/      ─    ✓    ✓
#     -restaurant/-appoint
#   aikikan-server           ─    ✓    ✓
#   platform-scheduler       ─    ─    ✓   (no HTTP ingress)
#   postgres/redis/minio     ─    ─    ✓
#
# Nota: los monoliths backend están en app+data y por tanto SÍ tienen
# salida a Internet (vía app, que no es internal). El aislamiento
# `internal: true` solo aplica a containers que ÚNICAMENTE están en
# data — i.e. postgres, redis, minio, scheduler.
# ─────────────────────────────────────────────────────────────────
networks:
  edge:
    driver: bridge
  app:
    driver: bridge
  data:
    driver: bridge
    internal: true
