    /* thin scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #D9D2C2; border-radius: 10px; border: 2px solid #FAF7F2; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* dotted texture for empty state backgrounds */
    .dotted {
      background-image: radial-gradient(#D9D2C2 1px, transparent 1px);
      background-size: 14px 14px;
      background-position: 0 0;
    }

    /* underline for active nav */
    .nav-link { position: relative; }
    .nav-link.active { color: #14131A; background: #F3EFE7; }
    .nav-link.active::before {
      content: "";
      position: absolute;
      left: 6px; top: 10px; bottom: 10px; width: 2px;
      background: #D9512C;
      border-radius: 2px;
    }

    /* fade in */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp .25s ease-out both; }

    /* modal backdrop */
    .backdrop {
      background: rgba(20, 19, 26, 0.35);
      backdrop-filter: blur(2px);
    }

    /* subtle top gradient on header */
    .header-grad {
      background: linear-gradient(180deg, #FAF7F2 0%, #FAF7F2 70%, rgba(250,247,242,0) 100%);
    }

    /* inputs */
    .input, .select, .textarea {
      background: #FDFBF7;
      border: 1px solid #E5DFD2;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      width: 100%;
      transition: border-color .15s, box-shadow .15s;
    }
    .input:focus, .select:focus, .textarea:focus {
      outline: none;
      border-color: #14131A;
      box-shadow: 0 0 0 3px rgba(20,19,26,0.08);
    }
    .label { font-size: 12px; font-weight: 600; color: #3B3A42; letter-spacing: .02em; text-transform: uppercase; }

    /* buttons */
    .btn { display: inline-flex; align-items: center; gap: 8px; height: 36px; padding: 0 14px; border-radius: 8px; font-weight: 500; font-size: 14px; line-height: 1; transition: all .15s; border: 1px solid transparent; white-space: nowrap; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #14131A; color: #FAF7F2; }
    .btn-primary:hover:not(:disabled) { background: #000; }
    .btn-ghost { background: transparent; color: #14131A; border-color: #D9D2C2; }
    .btn-ghost:hover { background: #F3EFE7; }
    .btn-danger { background: #8A2C2C; color: #FAF7F2; }
    .btn-danger:hover:not(:disabled) { background: #6e2121; }
    .btn-accent { background: #D9512C; color: #FAF7F2; }
    .btn-accent:hover { background: #A83E1F; }
    .btn-sm { height: 30px; padding: 0 10px; font-size: 13px; }

    /* badges */
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; font-size: 11.5px; font-weight: 600; letter-spacing: .02em; }
    .dot { width: 6px; height: 6px; border-radius: 999px; display: inline-block; }

    /* table */
    table.t { width: 100%; border-collapse: separate; border-spacing: 0; }
    table.t th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #6F6D78; padding: 10px 14px; border-bottom: 1px solid #E5DFD2; background: #FAF7F2; }
    table.t td { padding: 14px; border-bottom: 1px solid #EFEADE; font-size: 14px; vertical-align: middle; }
    table.t tbody tr:hover { background: #FBF8F1; }
    table.t tbody tr.clickable { cursor: pointer; }

    /* tabs */
    .tab { padding: 10px 2px; font-size: 13.5px; color: #6F6D78; border-bottom: 2px solid transparent; margin-right: 22px; font-weight: 500; cursor: pointer; }
    .tab.active { color: #14131A; border-bottom-color: #14131A; }

    /* avatar */
    .avatar { width: 28px; height: 28px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }

/* ------------------------------ HELPERS -------------------------------- */

function initials(name){
  return name.split(' ').filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase();
}
function fmtDate(iso, withTime=false){
  const d = new Date(iso);
  const opts = withTime ? { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' } : { day:'2-digit', month:'short', year:'numeric' };
  return d.toLocaleDateString('es-ES', opts).replace('.','');
}
function fmtMoney(n){
  return '€' + n.toLocaleString('es-ES', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtNumber(n){ return n.toLocaleString('es-ES'); }
function relTime(iso){
  const s = Math.floor((Date.now() - new Date(iso).getTime())/1000);
  if (s < 60) return 'hace ' + s + 's';
  if (s < 3600) return 'hace ' + Math.floor(s/60) + ' min';
  if (s < 86400) return 'hace ' + Math.floor(s/3600) + ' h';
  if (s < 86400*7) return 'hace ' + Math.floor(s/86400) + ' d';
  return fmtDate(iso);
}
function statusBadge(status){
  const map = {
    ACTIVE:    { color:'text-ok bg-okbg',       dot:'#2F6F4F', label:'Activo' },
    SUSPENDED: { color:'text-warn bg-warnbg',   dot:'#8A6B0A', label:'Suspendido' },
    ARCHIVED:  { color:'text-ink3 bg-paper2',   dot:'#6F6D78', label:'Archivado' },
    PURGED:    { color:'text-danger bg-dangerbg', dot:'#8A2C2C', label:'Purgado' },
  };
  const s = map[status] || map.ARCHIVED;
  return `<span class="badge ${s.color}"><span class="dot" style="background:${s.dot}"></span>${s.label}</span>`;
}
function stripeBadge(s){
  const map = {
    VERIFIED:     { color:'text-ok bg-okbg',         label:'KYC verificado' },
    PENDING:      { color:'text-info bg-infobg',     label:'KYC pendiente' },
    RESTRICTED:   { color:'text-warn bg-warnbg',     label:'Restringido' },
    DISCONNECTED: { color:'text-ink3 bg-paper2',     label:'Desvinculado' },
  };
  const m = map[s] || map.DISCONNECTED;
  return `<span class="badge ${m.color}">${m.label}</span>`;
}
function planBadge(p){
  const m = {
    STARTER:    { color:'bg-paper2 text-ink2 border border-line' },
    PRO:        { color:'bg-infobg text-info' },
    ENTERPRISE: { color:'bg-[#EEE3DC] text-accent2' },
  };
  return `<span class="badge ${m[p].color}">${p}</span>`;
}
function roleBadge(role){
  if (role === 'OWNER') return `<span class="badge bg-[#EEE3DC] text-accent2">Owner</span>`;
  if (role === 'ADMIN') return `<span class="badge bg-infobg text-info">Admin</span>`;
  if (role === 'SUPER_ADMIN') return `<span class="badge bg-[#EEE3DC] text-accent2">Super Admin</span>`;
  if (role === 'STAFF') return `<span class="badge bg-infobg text-info">Staff</span>`;
  return `<span class="badge bg-paper2 text-ink3">${role}</span>`;
}
function twofaBadge(on){
  return on
    ? `<span class="badge bg-okbg text-ok">${icons.lock}<span>2FA</span></span>`
    : `<span class="badge bg-warnbg text-warn">${icons.lock}<span>Sin 2FA</span></span>`;
}
function avatar(name, color='#D9D2C2'){
  return `<span class="avatar" style="background:${color}20; color:${color}; border:1px solid ${color}30">${initials(name)}</span>`;
}

function actionLabel(a){
  const labels = {
    TENANT_CREATED:   'Tenant creado',
    TENANT_UPDATED:   'Tenant actualizado',
    TENANT_SUSPENDED: 'Tenant suspendido',
    TENANT_REACTIVATED: 'Tenant reactivado',
    TENANT_ARCHIVED:  'Tenant archivado',
    TENANT_RESTORED:  'Tenant restaurado',
    INVITE_SENT:      'Invitación enviada',
    INVITE_ACCEPTED:  'Invitación aceptada',
    INVITE_CANCELLED: 'Invitación cancelada',
    ROLE_CHANGED:     'Rol modificado',
    ADMIN_REVOKED:    'Admin revocado',
    OWNERSHIP_TRANSFERRED: 'Propiedad transferida',
    EXPORT_REQUESTED: 'Exportación solicitada',
  };
  return labels[a] || a;
}
function actionColor(a){
  if (a.includes('SUSPEND') || a.includes('REVOKED') || a.includes('ARCHIVED')) return '#8A6B0A';
  if (a.includes('CREATED') || a.includes('REACTIVATED') || a.includes('ACCEPTED') || a.includes('RESTORED')) return '#2F6F4F';
  return '#2C5280';
}

/* ------------------------------ TOASTS --------------------------------- */
function toast(msg, variant='ok'){
  const el = document.createElement('div');
  const color = variant === 'ok' ? 'border-ok' : variant === 'warn' ? 'border-warn' : variant === 'danger' ? 'border-danger' : 'border-ink';
  el.className = `bg-white border ${color} rounded-lg shadow-pop px-4 py-3 text-sm fade-up flex items-start gap-3 max-w-sm`;
  el.innerHTML = `<span class="mt-0.5 text-${variant==='ok'?'ok':variant==='warn'?'warn':variant==='danger'?'danger':'ink'}">${icons.check}</span><span>${msg}</span>`;
  document.getElementById('toast-root').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(4px)'; el.style.transition = 'all .25s'; }, 3200);
  setTimeout(() => el.remove(), 3600);
}

      <div class="relative bg-white rounded-2xl shadow-pop border border-line w-full ${w} mx-4 fade-up">

}

function viewStaffTenants(){
  const f = state.filters;
  let list = TENANTS.filter(t => {
    const matchQ = !f.query || [t.name, t.legal, t.cif, t.subdomain, t.customDomain].filter(Boolean).some(x => x.toLowerCase().includes(f.query.toLowerCase()));
    const matchS = f.status === 'ALL' || t.status === f.status;
    const matchP = f.plan === 'ALL' || t.plan === f.plan;
    const matchC = f.country === 'ALL' || t.country === f.country;
    return matchQ && matchS && matchP && matchC;
  });
  list.sort((a,b) => {
    const dir = state.sort.dir === 'asc' ? 1 : -1;
    if (state.sort.key === 'name') return a.name.localeCompare(b.name) * dir;
    if (state.sort.key === 'created') return (new Date(a.created) - new Date(b.created)) * dir;

    return 0;
  });

  return `

function moveCaretEnd(id){
  const el = document.getElementById(id); if (!el) return;
  const v = el.value; el.value=''; el.value=v;
}

function filterChip(label, key, options){
  const current = state.filters[key];
  const currentLabel = options.find(o => o[0] === current)?.[1] || 'Todos';
  const isActive = current !== 'ALL';
  return `
    <div class="relative">
      <button onclick="toggleFilterMenu('${key}')" class="btn btn-ghost btn-sm ${isActive?'border-ink bg-paper2':''}">
        <span class="text-ink3">${icons.filter}</span>
        <span class="text-ink3">${label}:</span><span class="font-medium">${currentLabel}</span>
        ${icons.chevron}
      </button>
      <div id="flt-menu-${key}" class="hidden absolute left-0 top-full mt-1 bg-white border border-line rounded-lg shadow-pop p-1 z-20 min-w-[160px]">
        ${options.map(([v,l]) => `
          <button onclick="setFilter('${key}','${v}')" class="w-full text-left px-3 py-1.5 rounded-md hover:bg-paper2 text-[13px] flex items-center justify-between">
            <span>${l}</span>
            ${current===v ? `<span class="text-ok">${icons.check}</span>` : ''}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function toggleFilterMenu(key){
  document.querySelectorAll('[id^="flt-menu-"]').forEach(m => { if (m.id !== `flt-menu-${key}`) m.classList.add('hidden'); });
  document.getElementById(`flt-menu-${key}`).classList.toggle('hidden');
}
function setFilter(key, value){
  state.filters[key] = value;
  render();
}
function toggleSort(key){
  if (state.sort.key === key) state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
  else { state.sort.key = key; state.sort.dir = 'desc'; }
  render();
}
function sortArrow(key){
  if (state.sort.key !== key) return '<span class="text-ink3 opacity-30">↕</span>';
  return state.sort.dir === 'asc' ? '<span>↑</span>' : '<span>↓</span>';
}

function emptyRow(cols, msg){
  return `<tr><td colspan="${cols}"><div class="py-10 dotted rounded-lg text-center text-ink3 text-sm">${msg}</div></td></tr>`;
}

function tenantColor(id){
  const colors = ['#D9512C','#2F6F4F','#2C5280','#8A6B0A','#8A2C2C','#A83E1F','#14131A'];
  let h=0; for (let i=0;i<id.length;i++) h = (h*31 + id.charCodeAt(i)) >>> 0;
  return colors[h % colors.length];
}

function viewTenantAdmins(){
  const t = currentTenant();

  return `

      </div>

      <div class="bg-white border border-line rounded-xl shadow-card overflow-hidden mb-6">

          </thead>
          <tbody>
            ${admins.map(a => {
              const isMe = a.id === PERSONAS[state.role].id;
              const canEdit = (isOwner && !isMe) || (!isOwner && a.role === 'ADMIN' && !isMe);
              const isOwnerRow = a.role === 'OWNER';
              return `
                <tr>
                  <td>
                    <div class="flex items-center gap-3">
                      ${avatar(a.name, a.avatar)}

                        <div class="font-medium flex items-center gap-2">${a.name}${isMe ? '<span class="badge bg-paper2 text-ink3">Tú</span>':''}</div>

                  <td>${twofaBadge(a.twofa)}</td>
                  <td class="text-[13px] text-ink3">${relTime(a.last)}</td>

                      <div class="flex items-center justify-end gap-1">
                        ${isOwner && a.role === 'ADMIN' ? `<button onclick="openRoleChange('${a.id}','${a.name}')" class="btn btn-ghost btn-sm">Cambiar rol</button>` : ''}
                        <button onclick="openRevoke('${a.id}','${a.name}')" class="btn btn-ghost btn-sm text-danger">Revocar</button>
                      </div>
                    `: isMe ? `<span class="text-[12px] text-ink3">—</span>` : ''}
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>

      <div class="bg-white border border-line rounded-xl shadow-card overflow-hidden">
        <div class="px-5 py-4 border-b border-line flex items-center justify-between">
          <div>
            <div class="font-display text-[20px]">Invitaciones pendientes</div>
            <div class="text-xs text-ink3 mt-0.5">${invites.length ? invites.length + ' invitaciones en espera' : 'No hay invitaciones pendientes'}</div>

        ${invites.length ? `
          <table class="t">
            <thead><tr><th>Email</th><th>Rol</th><th>Enviada</th><th>Expira</th><th class="text-right">Acciones</th></tr></thead>
            <tbody>

      </div>
    </div>
  `;
}

    <form class="p-6 space-y-4" onsubmit="event.preventDefault(); closeModal(); toast('Tenant reactivado')">
      <div>
        <div class="label mb-1.5">Justificación</div>
        <textarea class="textarea" rows="3" placeholder="La suspensión se levanta porque…" required></textarea>
      </div>
      <div class="bg-okbg border border-ok/30 rounded-lg p-3 text-[12.5px] text-ok flex gap-2">
        <span class="mt-0.5">${icons.check}</span>
        <div>Tras la reactivación, la API vuelve a aceptar peticiones y se reanudan los webhooks. Los eventos acumulados durante la suspensión <strong>no</strong> se reintentan automáticamente.</div>
      </div>
      <div class="flex items-center justify-end gap-2 pt-2">
        <button type="button" onclick="closeModal()" class="btn btn-ghost">Cancelar</button>
        <button type="submit" class="btn btn-primary">Reactivar</button>
      </div>
    </form>
  `);
}

function openArchive(tid){
  const t = TENANTS.find(x => x.id === tid);
  openModal(`
    <div class="p-6 border-b border-line"><div class="flex items-center justify-between"><div><div class="font-display text-[22px] text-danger">Archivar ${t.name}</div><div class="text-[13px] text-ink3 mt-1">Acción reversible solo dentro de los 90 días siguientes.</div></div><button onclick="closeModal()" class="text-ink3 hover:text-ink">${icons.close}</button></div></div>
    <form class="p-6 space-y-4" onsubmit="event.preventDefault(); closeModal(); toast('Tenant archivado', 'warn')">
      <div class="bg-dangerbg border border-danger/30 rounded-lg p-3 text-[12.5px] text-danger flex gap-2">
        <span class="mt-0.5">${icons.info}</span>
        <div>Al archivar: se libera el subdominio, se revocan todas las API keys, se detienen los webhooks, los Admins pierden acceso. Los datos se borran definitivamente tras 90 días.</div>
      </div>
      <div>
        <div class="label mb-1.5">Motivo (opcional)</div>
        <select class="select"><option>Cliente canceló servicio</option><option>Migración a otra plataforma</option><option>Fin de contrato</option><option>Otro</option></select>
      </div>
      <div>
        <div class="label mb-1.5">Confirmación · escribe <code class="font-mono text-[12px] bg-paper2 px-1.5 rounded">${t.name}</code> para continuar</div>
        <input id="confirm-archive" class="input" placeholder="${t.name}" oninput="document.getElementById('btn-archive').disabled = this.value !== '${t.name.replace(/'/g,"\\'")}'"/>
      </div>
      <div class="flex items-center justify-end gap-2 pt-2">
        <button type="button" onclick="closeModal()" class="btn btn-ghost">Cancelar</button>
        <button id="btn-archive" type="submit" class="btn btn-danger" disabled>${icons.archive}Archivar definitivamente</button>
      </div>
    </form>
  `);
}

function openRestore(tid){
  const t = TENANTS.find(x => x.id === tid);
  openModal(`
    <div class="p-6 border-b border-line"><div class="flex items-center justify-between"><div class="font-display text-[22px]">Restaurar ${t.name}</div><button onclick="closeModal()" class="text-ink3 hover:text-ink">${icons.close}</button></div></div>
    <div class="p-6 space-y-4">
      <div class="bg-infobg border border-info/30 rounded-lg p-3 text-[12.5px] text-info flex gap-2">
        <span class="mt-0.5">${icons.info}</span>
        <div>El tenant vuelve a estado <strong>ACTIVE</strong>. El subdominio anterior puede estar reasignado. Las API keys previas <strong>no</strong> se reactivan y los Admins deben ser reinvitados.</div>
      </div>
      <div class="flex items-center justify-end gap-2 pt-2">
        <button onclick="closeModal()" class="btn btn-ghost">Cancelar</button>
        <button onclick="closeModal(); toast('Tenant restaurado')" class="btn btn-primary">Restaurar</button>
      </div>
    </div>
  `);
}

function openExport(tid){
  openModal(`
    <div class="p-6 border-b border-line"><div class="flex items-center justify-between"><div><div class="font-display text-[22px]">Exportar datos del tenant</div><div class="text-[13px] text-ink3 mt-1">RGPD · derecho a la portabilidad</div></div><button onclick="closeModal()" class="text-ink3 hover:text-ink">${icons.close}</button></div></div>
    <div class="p-6 space-y-4">
      <div class="text-[13.5px] leading-relaxed text-ink2">
        Se generará un archivo <strong>ZIP cifrado</strong> con todos los datos scoped por <code class="font-mono text-[12px] bg-paper2 px-1.5 rounded">tenant_id</code>: transacciones, split rules, administradores, configuración, webhooks y audit log.
      </div>
      <ul class="text-[13px] space-y-1.5 text-ink3">
        <li class="flex items-start gap-2"><span class="text-ok mt-0.5">${icons.check}</span>Proceso asíncrono · recibirás el enlace en ~10 min</li>
        <li class="flex items-start gap-2"><span class="text-ok mt-0.5">${icons.check}</span>URL firmada de un solo uso, expira en 7 días</li>
        <li class="flex items-start gap-2"><span class="text-ok mt-0.5">${icons.check}</span>Contraseña del ZIP enviada por canal separado</li>
      </ul>
      <div>
        <div class="label mb-1.5">Email de entrega</div>
        <input type="email" class="input" value="${PERSONAS[state.role].email}"/>
      </div>
      <div class="flex items-center justify-end gap-2 pt-2">
        <button onclick="closeModal()" class="btn btn-ghost">Cancelar</button>
        <button onclick="closeModal(); toast('Exportación solicitada — recibirás el enlace por email')" class="btn btn-primary">${icons.download}Solicitar exportación</button>
      </div>
    </div>
  `);
}

function openInvite(){
  openModal(`
    <div class="p-6 border-b border-line"><div class="flex items-center justify-between"><div class="font-display text-[22px]">Invitar administrador</div><button onclick="closeModal()" class="text-ink3 hover:text-ink">${icons.close}</button></div></div>
    <form class="p-6 space-y-4" onsubmit="event.preventDefault(); closeModal(); toast('Invitación enviada')">
      <div>
        <div class="label mb-1.5">Email</div>
        <input type="email" class="input" placeholder="persona@${currentTenant().subdomain}.com" required>
      </div>
      <div>
        <div class="label mb-1.5">Rol</div>
        <select class="select"><option>ADMIN</option></select>
        <div class="text-[11.5px] text-ink3 mt-1.5">El rol OWNER no puede asignarse desde aquí — se gestiona vía transferencia de propiedad.</div>
      </div>
      <div class="bg-paper2 border border-line rounded-lg p-3 text-[12.5px] text-ink2 flex gap-2">
        <span class="text-ink3 mt-0.5">${icons.info}</span>
        <div>La invitación caduca en <strong>7 días</strong>. El invitado recibirá un enlace firmado de un solo uso.</div>
      </div>
      <div class="flex items-center justify-end gap-2 pt-2">
        <button type="button" onclick="closeModal()" class="btn btn-ghost">Cancelar</button>
        <button type="submit" class="btn btn-primary">Enviar invitación</button>
      </div>
    </form>
  `);
}

function openRoleChange(uid, name){
  openModal(`
    <div class="p-6 border-b border-line"><div class="flex items-center justify-between"><div class="font-display text-[22px]">Cambiar rol de ${name}</div><button onclick="closeModal()" class="text-ink3 hover:text-ink">${icons.close}</button></div></div>
    <form class="p-6 space-y-4" onsubmit="event.preventDefault(); closeModal(); toast('Rol actualizado')">
      <div>
        <div class="label mb-1.5">Rol actual</div>
        <div>${roleBadge('ADMIN')}</div>
      </div>
      <div>
        <div class="label mb-1.5">Nuevo rol</div>
        <select class="select"><option>ADMIN</option></select>
        <div class="text-[11.5px] text-ink3 mt-1.5">Para convertir a esta persona en Owner, usa <strong>Transferir propiedad</strong>.</div>
      </div>
      <div class="flex items-center justify-end gap-2 pt-2">
        <button type="button" onclick="closeModal()" class="btn btn-ghost">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  `);
}

function openRevoke(uid, name){
  openModal(`
    <div class="p-6 border-b border-line"><div class="flex items-center justify-between"><div class="font-display text-[22px] text-danger">Revocar acceso a ${name}</div><button onclick="closeModal()" class="text-ink3 hover:text-ink">${icons.close}</button></div></div>
    <form class="p-6 space-y-4" onsubmit="event.preventDefault(); closeModal(); toast(name + ' ha perdido acceso al tenant', 'warn')">
      <div class="text-[13.5px] text-ink2">La persona perderá acceso al tenant <strong>${currentTenant().name}</strong> de inmediato. Su cuenta Voragine seguirá existiendo para otros tenants.</div>
      <div>
        <div class="label mb-1.5">Motivo (opcional)</div>
        <textarea class="textarea" rows="3" placeholder="Ej: ya no trabaja con nosotros…"></textarea>
      </div>
      <div class="flex items-center justify-end gap-2 pt-2">
        <button type="button" onclick="closeModal()" class="btn btn-ghost">Cancelar</button>
        <button type="submit" class="btn btn-danger">Revocar acceso</button>
      </div>
    </form>
  `);
}

function openTransfer(){
  const t = currentTenant();
  const admins = (ADMINS_BY_TENANT[t.id] || mockAdmins(t)).filter(a => a.role === 'ADMIN');
  openModal(`
    <div class="p-6 border-b border-line"><div class="flex items-center justify-between"><div><div class="font-display text-[22px]">Transferir propiedad</div><div class="text-[13px] text-ink3 mt-1">Proceso de doble confirmación · tú dejarás de ser Owner.</div></div><button onclick="closeModal()" class="text-ink3 hover:text-ink">${icons.close}</button></div></div>
    <form class="p-6 space-y-4" onsubmit="event.preventDefault(); closeModal(); toast('Transferencia iniciada — pendiente de aceptación del destinatario')">
      <div>
        <div class="label mb-1.5">Destinatario</div>
        <select class="select">
          ${admins.length ? admins.map(a => `<option>${a.name} · ${a.email}</option>`).join('') : '<option disabled>No hay administradores elegibles</option>'}
        </select>
        <div class="text-[11.5px] text-ink3 mt-1.5">Solo Admins actuales del tenant pueden recibir la propiedad.</div>
      </div>
      <div>
        <div class="label mb-1.5">Confirma con tu contraseña</div>
        <input type="password" class="input" required>
      </div>
      <div class="bg-warnbg border border-warn/30 rounded-lg p-3 text-[12.5px] text-warn flex gap-2">
        <span class="mt-0.5">${icons.info}</span>
        <div>El destinatario recibirá un email con un enlace de aceptación (expira en 48h). Hasta que acepte, los roles no cambian. Tras aceptar, tú pasarás a ser Admin.</div>
      </div>
      <div class="flex items-center justify-end gap-2 pt-2">
        <button type="button" onclick="closeModal()" class="btn btn-ghost">Cancelar</button>
        <button type="submit" class="btn btn-primary" ${admins.length?'':'disabled'}>${icons.transfer}Iniciar transferencia</button>
      </div>
    </form>
  `);
}

function openNewStaff(){
  openModal(`
    <div class="p-6 border-b border-line"><div class="flex items-center justify-between"><div class="font-display text-[22px]">Invitar miembro del staff</div><button onclick="closeModal()" class="text-ink3 hover:text-ink">${icons.close}</button></div></div>
    <form class="p-6 space-y-4" onsubmit="event.preventDefault(); closeModal(); toast('Invitación enviada')">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <div class="label mb-1.5">Nombre</div>
          <input class="input" placeholder="Nombre Apellido" required>
        </div>
        <div>
          <div class="label mb-1.5">Email corporativo</div>
          <input type="email" class="input" placeholder="persona@voragine.app" required>
        </div>
        <div class="col-span-2">
          <div class="label mb-1.5">Rol</div>
          <select class="select">
            <option value="STAFF">STAFF — acceso operativo</option>
            <option value="SUPER_ADMIN">SUPER_ADMIN — puede gestionar otros staff</option>
          </select>
        </div>
      </div>
      <div class="bg-paper2 border border-line rounded-lg p-3 text-[12.5px] text-ink2 flex gap-2">
        <span class="text-ink3 mt-0.5">${icons.info}</span>
        <div>El invitado recibirá un enlace de activación válido 72h. Deberá configurar contraseña y activar <strong>2FA</strong> obligatorio antes del primer acceso.</div>
      </div>
      <div class="flex items-center justify-end gap-2 pt-2">
        <button type="button" onclick="closeModal()" class="btn btn-ghost">Cancelar</button>
        <button type="submit" class="btn btn-primary">Enviar invitación</button>
      </div>
    </form>
  `);
}

/* ------------------------------ INIT ----------------------------------- */
render();
</script>
</body>
