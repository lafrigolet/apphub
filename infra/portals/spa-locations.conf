# Locations compartidas por los 9 server blocks del contenedor portals
# (ADR 017). Mismo contenido que infra/nginx/spa.conf pero factorizado:
# cada server block fija su `root` y su `listen` e incluye este snippet.

# Hashed assets — Vite emits these (under /assets/) with a content-hash
# fingerprint, so they can live forever and use `immutable`.
location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
  expires 1y;
  add_header Cache-Control "public, immutable";
  try_files $uri =404;
}

# Media assets (mp4, webm, audio) — usually live in public/ WITHOUT a
# fingerprint: cache aggressively but stop short of `immutable`.
location ~* \.(?:mp4|webm|m4v|mov|mp3|wav|ogg|opus)$ {
  expires 30d;
  add_header Cache-Control "public, max-age=2592000";
  try_files $uri =404;
}

# SPA fallback — any unknown path returns index.html so React Router
# can resolve it client-side.
location / {
  try_files $uri $uri/ /index.html;
}

# index.html itself must NOT be cached, otherwise rolling deploys take
# forever to be picked up by clients holding stale copies.
location = /index.html {
  add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  add_header Pragma "no-cache" always;
  add_header Expires 0 always;
}

# Trivial healthcheck the gateway / orchestrator can probe.
location = /_health {
  access_log off;
  return 200 "ok\n";
  add_header Content-Type text/plain;
}

# Don't ever leak the dotfile bundle accidentally.
location ~ /\. {
  deny all;
}
