# Contenedor `portals` (prod) — un server block POR PUERTO, mismos puertos
# que los vite dev servers (5173, 5175–5182): así los upstreams del gateway
# son idénticos en dev y prod. Deliberadamente NO se discrimina por Host:
# el gateway ya elige el portal por server block, y tenant-console sirve
# hostnames dinámicos (ADR 012) que un map estático rompería. ADR 017.

server {
  listen 5173;
  server_name _;
  root /usr/share/nginx/html/portal;
  index index.html;
  include /etc/nginx/snippets/spa-locations.conf;
}

