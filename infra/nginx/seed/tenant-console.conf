# Tenant Console — tenant-console.hulkstein.local (dev) / tenant-console.hulkstein.com (prod)
#
# Per-tenant subdomains (bastardo.hulkstein.local, …) get their own server
# blocks rendered into Redis when the app is registered (see
# platform/tenant-config/src/services/nginx-config.service.js); those server
# blocks proxy `/` to the matching <subdomain>-portal upstream. The dev
# subdomain below is just a direct entry point for staff testing the shell
# without a real tenant.
server {
  listen 80;
  include /etc/nginx/snippets/tls-listen.conf;
  server_name tenant-console.hulkstein.local tenant-console.hulkstein.com;

  # Shared platform routes (auth, tenants, payments, splitpay, …).
  include /etc/nginx/snippets/platform-routes.conf;

  # Tenant Console frontend.
  location / {
    proxy_pass http://tenant_console_portal;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
