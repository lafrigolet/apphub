# JS Electric — js-electric.hulkstein.local (dev) / js-electric.hulkstein.com (prod)
server {
  listen 80;
  include /etc/nginx/snippets/tls-listen.conf;
  server_name js-electric.hulkstein.local js-electric.hulkstein.com;

  # Cross-app platform routes (inquiries, donations, leads, …).
  # El form de contacto del portal POSTea a /api/inquiries/ del platform-core.
  include /etc/nginx/snippets/platform-routes.conf;

  location / {
    proxy_pass http://js_electric_portal;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
