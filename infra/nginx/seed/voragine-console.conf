# Voragine Console — voragine-console.apphub.local (dev) / voragine-console.hulkstein.com (prod)
server {
  listen 80;
  include /etc/nginx/snippets/tls-listen.conf;
  server_name voragine-console.apphub.local voragine-console.hulkstein.com;

  # Shared platform routes
  include /etc/nginx/snippets/platform-routes.conf;

  # Voragine Console frontend
  location / {
    proxy_pass http://voragine_console_portal;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
