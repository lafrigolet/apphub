# Hulkstein Console — console.hulkstein.local (dev) / console.hulkstein.com (prod)
#
# Staff console. The legacy alias `voragine-console.{hulkstein.local,
# hulkstein.com}` stays on the same server block so old bookmarks / CI
# references keep working during the rename window.
server {
  listen 80;
  include /etc/nginx/snippets/tls-listen.conf;
  server_name console.hulkstein.local
              console.hulkstein.com
              voragine-console.hulkstein.local
              voragine-console.hulkstein.com;

  # Shared platform routes
  include /etc/nginx/snippets/platform-routes.conf;

  # Hulkstein Console frontend
  location / {
    proxy_pass http://console_portal;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
