# Lucía Passardi — luciapassardi.hulkstein.local (dev) / luciapassardi.hulkstein.com (prod)
# Landing + backoffice: el portal consume módulos de plataforma (auth, services,
# bookings, packages, commerce, …) vía /api → platform-routes.
server {
  listen 80;
  include /etc/nginx/snippets/tls-listen.conf;
  server_name luciapassardi.hulkstein.local luciapassardi.hulkstein.com;

  # Rutas de plataforma (auth, services, bookings, availability, packages,
  # commerce, notifications, storage, tenants, …).
  include /etc/nginx/snippets/platform-routes.conf;

  location / {
    proxy_pass http://luciapassardi_portal;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
