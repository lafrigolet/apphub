# Lucía Passardi — luciapassardi.hulkstein.local (dev) / luciapassardi.hulkstein.com (prod)
# Landing estática (yoga). Contacto directo (WhatsApp/email/Instagram): no usa /api,
# por eso NO incluye platform-routes.
server {
  listen 80;
  include /etc/nginx/snippets/tls-listen.conf;
  server_name luciapassardi.hulkstein.local luciapassardi.hulkstein.com;

  location / {
    proxy_pass http://luciapassardi_portal;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
