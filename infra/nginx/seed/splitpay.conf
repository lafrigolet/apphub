# Split Pay — splitpay.hulkstein.local (dev) / splitpay.hulkstein.com (prod)
server {
  listen 80;
  include /etc/nginx/snippets/tls-listen.conf;
  server_name splitpay.hulkstein.local splitpay.hulkstein.com;

  # Shared platform routes
  include /etc/nginx/snippets/platform-routes.conf;

  # Split-pay-specific routes — now served by the splitpay module inside platform-core
  location /api/app/split-rules/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://platform_core/v1/splitpay/split-rules/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /api/app/connect-accounts/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://platform_core/v1/splitpay/connect-accounts/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /api/app/payments/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://platform_core/v1/splitpay/payments/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /api/app/webhooks/stripe {
    proxy_pass http://platform_core/v1/splitpay/webhooks/stripe;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header Stripe-Signature  $http_stripe_signature;
  }

  # Split Pay frontend
  location / {
    proxy_pass http://splitpay_portal;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
