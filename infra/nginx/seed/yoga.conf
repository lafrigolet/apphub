# Yoga Studio — yoga.apphub.local (dev) / yoga.apphub.com (prod)
server {
  listen 80;
  server_name yoga.apphub.local yoga.apphub.com;

  # Shared platform routes (auth, payments, notifications, catalog, basket)
  include /etc/nginx/snippets/platform-routes.conf;

  # App-specific routes
  location /api/app/users/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://yoga_users/v1/users/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /api/app/classes/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://yoga_classes/v1/classes/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /api/app/bookings/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://yoga_bookings/v1/bookings/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /api/app/bonuses/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://yoga_bonuses/v1/bonuses/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location /api/app/reports/ {
    limit_req zone=api burst=10 nodelay;
    proxy_pass http://yoga_reporting/v1/reports/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location /api/app/ratings/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://yoga_reporting/v1/ratings/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # Yoga Studio frontend
  location / {
    proxy_pass http://yoga_portal;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
