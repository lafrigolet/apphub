# TPV — tpv.hulkstein.local (dev) / tpv.hulkstein.com (prod)
# Teclado web + cobro por QR (Stripe Checkout). Sin backend propio: usa los
# módulos de plataforma (auth, payments) vía /api/* y el portal estático del
# contenedor `portals` (puerto 5183, ADR 017).
server {
  listen 80;
  include /etc/nginx/snippets/tls-listen.conf;
  server_name tpv.hulkstein.local tpv.hulkstein.com;

  # Rutas de plataforma (auth, payments, tpv, …).
  include /etc/nginx/snippets/platform-routes.conf;

  # Portal estático.
  location / {
    proxy_pass http://tpv_portal;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
