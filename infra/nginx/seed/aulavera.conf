# Aulavera — aulavera.hulkstein.local (dev) / aulavera.hulkstein.com (prod)
server {
  listen 80;
  include /etc/nginx/snippets/tls-listen.conf;
  server_name aulavera.hulkstein.local aulavera.hulkstein.com;

  # Cross-app platform routes (auth, tenants, payments, leads, donations, …).
  include /etc/nginx/snippets/platform-routes.conf;

  # App-specific backend (ADR 013 — one container per app, schema
  # `app_aulavera`). Ej.: GET /api/aulavera/events → /v1/aulavera/events.
  location /api/aulavera/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://aulavera_server/v1/aulavera/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  location / {
    proxy_pass http://aulavera_portal;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
  }
}
