# Reusable per-portal NGINX config — used by every portal's production
# Docker image (nginx:alpine). Each portal copies its built dist/ into
# /usr/share/nginx/html and uses this file as /etc/nginx/conf.d/default.conf.
#
# The frontal NGINX gateway (infra/nginx/) routes the public subdomain to
# this internal nginx-alpine container; this server block only has to:
#   - resolve SPA client-side routing (any 404 → /index.html)
#   - cache hashed assets aggressively
#   - never cache index.html (so deploys are picked up immediately)
server {
  listen       80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Hashed assets — Vite emits with a fingerprint, so they can live forever.
  location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — any unknown path returns index.html so React Router
  # can resolve it client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html itself must NOT be cached, otherwise rolling deploys take
  # forever to be picked up by clients holding stale copies.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires 0 always;
  }

  # Trivial healthcheck the gateway / orchestrator can probe.
  location = /_health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Don't ever leak the dotfile bundle accidentally.
  location ~ /\. {
    deny all;
  }
}
