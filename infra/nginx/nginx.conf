events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s;  # Docker internal DNS

  # Recover the real client IP behind Cloudflare's proxy (no-op in dev where
  # CF isn't in front — none of the listed ranges will match `$remote_addr`).
  include /etc/nginx/snippets/cloudflare-real-ip.conf;

  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

  # Static upstream definitions (one entry per backend service in this stack).
  include /etc/nginx/conf.d/upstream.conf;

  # Catch-all: health check + reject unknown hosts (no server_name match).
  server {
    listen 80 default_server;

    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    location / {
      return 444;
    }
  }

  # Per-subdomain server blocks: rendered dynamically by the sidecar from
  # the Redis hash "nginx:configs". Adding/removing an app via platform-core
  # reflects here within ~2s without restarting NGINX.
  include /etc/nginx/conf.d/sites/*.conf;
}
