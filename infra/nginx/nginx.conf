events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s;  # Docker internal DNS

  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

  # All upstream definitions
  include /etc/nginx/conf.d/upstream.conf;

  # Catch-all: health check + reject unknown hosts
  server {
    listen 80 default_server;

    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    location / {
      return 444;
    }
  }

  # Per-subdomain server blocks
  include /etc/nginx/conf.d/portal.conf;
  include /etc/nginx/conf.d/yoga.conf;
  include /etc/nginx/conf.d/splitpay.conf;
  include /etc/nginx/conf.d/aikikan.conf;
}
