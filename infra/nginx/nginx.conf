events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s;  # Docker internal DNS

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

  upstream split_payments {
    server split-payments:3001;
  }

  upstream portal {
    server portal:5173;
  }

  upstream yoga_auth          { server yoga-auth:3010; }
  upstream yoga_users         { server yoga-users:3011; }
  upstream yoga_classes       { server yoga-classes:3012; }
  upstream yoga_bookings      { server yoga-bookings:3013; }
  upstream yoga_bonuses       { server yoga-bonuses:3014; }
  upstream yoga_payments      { server yoga-payments:3015; }
  upstream yoga_notifications { server yoga-notifications:3016; }
  upstream yoga_reporting     { server yoga-reporting:3017; }
  upstream yoga_portal        { server yoga-portal:5174; }

  server {
    listen 80;
    server_name _;

    # Health check
    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    # Portal frontend
    location / {
      proxy_pass http://portal;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # WebSockets for HMR
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # split-payments service
    location /api/payments/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://split_payments/v1/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
      proxy_connect_timeout 5s;
    }

    # Stripe webhooks bypass rate limiting (Stripe has its own retry logic)
    location /api/payments/webhooks/stripe {
      proxy_pass http://split_payments/v1/webhooks/stripe;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header Stripe-Signature  $http_stripe_signature;
    }

    # Future services — uncomment as they are added
    # location /api/auth/ {
    #   proxy_pass http://auth:3002/v1/;
    # }
    # location /api/notifications/ {
    #   proxy_pass http://notifications:3003/v1/;
    # }
    # location /api/tenants/ {
    #   proxy_pass http://tenant-config:3004/v1/;
    # }

    # ── YogaStudio services ──────────────────────────────────────
    location /api/yoga/auth/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://yoga_auth/v1/auth/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /api/yoga/users/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://yoga_users/v1/users/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /api/yoga/classes/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://yoga_classes/v1/classes/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /api/yoga/bookings/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://yoga_bookings/v1/bookings/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /api/yoga/bonuses/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://yoga_bonuses/v1/bonuses/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /api/yoga/payments/webhooks/stripe {
      proxy_pass http://yoga_payments/v1/webhooks/stripe;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header Stripe-Signature  $http_stripe_signature;
    }

    location /api/yoga/payments/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://yoga_payments/v1/payments/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /api/yoga/notifications/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass http://yoga_notifications/v1/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /api/yoga/reports/ {
      limit_req zone=api burst=10 nodelay;
      proxy_pass http://yoga_reporting/v1/reports/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location /api/yoga/ratings/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://yoga_reporting/v1/ratings/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # Yoga Studio portal (Vite dev server)
    location /yoga/ {
      proxy_pass http://yoga_portal/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }
  }
}
