events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s;  # Docker internal DNS

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

  upstream split_payments {
    server split-payments:3001;
  }

  upstream portal {
    server portal:5173;
  }

  server {
    listen 80;
    server_name _;

    # Health check
    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    # Portal frontend
    location / {
      proxy_pass http://portal;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # WebSockets for HMR
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # split-payments service
    location /api/payments/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://split_payments/v1/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
      proxy_connect_timeout 5s;
    }

    # Stripe webhooks bypass rate limiting (Stripe has its own retry logic)
    location /api/payments/webhooks/stripe {
      proxy_pass http://split_payments/v1/webhooks/stripe;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header Stripe-Signature  $http_stripe_signature;
    }

    # Future services — uncomment as they are added
    # location /api/auth/ {
    #   proxy_pass http://auth:3002/v1/;
    # }
    # location /api/notifications/ {
    #   proxy_pass http://notifications:3003/v1/;
    # }
    # location /api/tenants/ {
    #   proxy_pass http://tenant-config:3004/v1/;
    # }
  }
}
