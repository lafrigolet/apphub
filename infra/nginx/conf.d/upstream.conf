# ── Platform services ──────────────────────────────────────────
# platform_core: the modular monolith hosting auth + notifications + payments
# + tenant-config + splitpay modules. Most /api/<module>/ routes in
# platform-routes.conf proxy here.
upstream platform_core          { server platform-core:3000; }
# platform_marketplace: the marketplace monolith hosting orders + inventory
# + reviews + messaging + shipping + disputes + catalog + basket. Routes
# /api/{orders,inventory,reviews,messages,shipping,disputes,catalog,basket}/
# in platform-routes.conf proxy here.
upstream platform_marketplace   { server platform-marketplace:3100; }
# (platform_catalog and platform_basket: removed — both folded into platform_marketplace)
# platform_restaurant: the restaurant monolith hosting menu + reservations +
# floor-plan + kds + pos + delivery-dispatch modules. Routes /api/{menu,
# reservations,floor-plan,kds,pos,delivery-dispatch}/ in platform-routes.conf
# proxy here.
upstream platform_restaurant    { server platform-restaurant:3200; }
# platform_appointments: the appointments monolith hosting services + resources
# + bookings + availability + intake-forms + telehealth + packages +
# practitioner-payouts modules. Routes /api/{services,resources,bookings,
# availability,intake-forms,telehealth,packages,practitioner-payouts}/ in
# platform-routes.conf proxy here.
upstream platform_appointments  { server platform-appointments:3300; }

# ── AppHub admin portal ────────────────────────────────────────
upstream apphub_portal          { server portal:5173; }

# ── Yoga Studio — all in one container (PM2) ───────────────────
upstream yoga_portal            { server yoga-studio:5174; }
upstream yoga_users             { server yoga-studio:3011; }
upstream yoga_classes           { server yoga-studio:3012; }
upstream yoga_bookings          { server yoga-studio:3013; }
upstream yoga_bonuses           { server yoga-studio:3014; }
upstream yoga_reporting         { server yoga-studio:3017; }
# auth → platform_auth | payments → platform_payments | notifications → platform_notifications

# ── Aikikan ────────────────────────────────────────────────────
upstream aikikan_portal         { server aikikan-portal:5176; }

# ── Split Pay ──────────────────────────────────────────────────
upstream splitpay_portal        { server splitpay-portal:5175; }
# splitpay_core was a standalone container; the splitpay module now ships
# inside platform_core (mounted under /v1/splitpay/*).

# ── Voragine Console ───────────────────────────────────────────
upstream voragine_console_portal { server voragine-console-portal:5177; }

# ── Tenant Console ─────────────────────────────────────────────
upstream tenant_console_portal { server tenant-console-portal:5178; }
