# Production upstream definitions — used when the prod compose override
# is in effect (docker-compose.prod.yml). The portal services are nginx-alpine
# containers serving their built `dist/` on port 80; backend services keep
# their dev ports. yoga-portal is split out of the yoga-studio container into
# its own service.
#
# Mount this file at /etc/nginx/conf.d/upstream.conf in the gateway nginx
# container by overriding the volume mount in docker-compose.prod.yml.

# ── Platform services (unchanged from dev) ─────────────────────
upstream platform_core          { server platform-core:3000; }
upstream platform_marketplace   { server platform-marketplace:3100; }
upstream platform_restaurant    { server platform-restaurant:3200; }
upstream platform_appointments  { server platform-appointments:3300; }

# ── Portals (nginx-alpine, port 80 each) ───────────────────────
upstream apphub_portal          { server portal:80; }
upstream yoga_portal            { server yoga-portal:80; }
upstream aikikan_portal         { server aikikan-portal:80; }
upstream splitpay_portal        { server splitpay-portal:80; }
upstream voragine_console_portal { server voragine-console-portal:80; }

# ── Yoga Studio backend services (still inside yoga-studio PM2 container) ──
upstream yoga_users     { server yoga-studio:3011; }
upstream yoga_classes   { server yoga-studio:3012; }
upstream yoga_bookings  { server yoga-studio:3013; }
upstream yoga_bonuses   { server yoga-studio:3014; }
upstream yoga_reporting { server yoga-studio:3017; }
