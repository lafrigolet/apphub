# TLS default_server listener — DEV STUB (no certs, no listener).
#
# Companion to tls-listen.conf, but for the catch-all server block in
# nginx.conf. In dev this is empty — the catch-all only owns :80.
#
# In production the prod compose override mounts
# `tls-listen-default.prod.conf` on top of this path, activating
# `listen 443 ssl http2 default_server;` so unknown SNI never falls
# through to a sibling app's :443 server block.
