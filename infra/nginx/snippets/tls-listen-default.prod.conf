# TLS default_server listener — PRODUCTION.
#
# Activated by docker-compose.prod.yml, which volume-mounts this file on
# top of the dev stub at /etc/nginx/snippets/tls-listen-default.conf.
#
# Defense-in-depth: a request that hits the gateway with an unknown SNI
# (e.g. a new app whose seed config hasn't been pushed into Redis yet)
# MUST NOT fall through to whichever :443 server block was loaded first
# alphabetically — that historically caused aikikan to answer requests
# for aulavera.hulkstein.com when the aulavera seed was missing.
#
# Cert files: same Cloudflare Origin Certificate as tls-listen.prod.conf
# (covers *.hulkstein.com). Required on the host:
#   /etc/cloudflare/origin/cert.pem  (mode 0644)
#   /etc/cloudflare/origin/key.pem   (mode 0600, owner root)

listen 443 ssl http2 default_server;

ssl_certificate     /etc/cloudflare/origin/cert.pem;
ssl_certificate_key /etc/cloudflare/origin/key.pem;

ssl_protocols             TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_session_cache         shared:SSL:10m;
ssl_session_timeout       1d;
ssl_session_tickets       off;
