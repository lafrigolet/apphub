# TLS listener — DEV STUB (no certs, no listener).
#
# Each per-app server block in the seeds and the dynamic templates does
# `include /etc/nginx/snippets/tls-listen.conf;` right after `listen 80;`.
# In development this resolves to this empty file → server blocks are
# HTTP-only.
#
# In production the docker-compose.prod.yml override mounts
# `tls-listen.prod.conf` on top of this path, activating
# `listen 443 ssl http2;` plus the Cloudflare Origin Certificate.
