# Leads module — public contact form submissions from the Hulkstein landing
# (POST /v1/leads, no auth) + staff admin endpoints (GET/PATCH, role-gated).
# Lower burst than other modules: it's a write-only public endpoint and we
# don't want bots hammering it.
location /api/leads/ {
  limit_req zone=api burst=5 nodelay;
  proxy_pass http://platform_core/v1/leads/;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 30s;
}

# Storage module — presigned-URL minting + metadata. Bytes go DIRECT from the
# browser to MinIO/S3 (port 9000 in dev) — never through this gateway.
location /api/storage/ {
  limit_req zone=api burst=20 nodelay;
  proxy_pass http://platform_core/v1/storage/;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 30s;
}

# Splitpay module — Stripe Connect endpoints. Available from any subdomain so
# tenant-side consoles (voragine-console, app portals) can manage their own
# connect accounts and split rules. /api/app/* is preserved in splitpay.conf
# as a legacy alias for the splitpay.apphub.local frontend.
location /api/splitpay/ {
  limit_req zone=api burst=20 nodelay;
  proxy_pass http://platform_core/v1/splitpay/;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 30s;
}

