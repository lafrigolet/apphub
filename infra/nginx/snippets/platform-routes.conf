# Leads module — public contact form submissions from the Hulkstein landing
# (POST /v1/leads, no auth) + staff admin endpoints (GET/PATCH, role-gated).
# Lower burst than other modules: it's a write-only public endpoint and we
# don't want bots hammering it.
location /api/leads/ {
  limit_req zone=api burst=5 nodelay;
  proxy_pass http://platform_core/v1/leads/;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 30s;
}

# Inquiries module — per-tenant contact form. POST público (form submit
# desde el portal de cualquier app) + admin endpoints (GET/PATCH/settings).
# burst bajo: es write-only público, no queremos bots hammering.
location /api/inquiries/ {
  limit_req zone=api burst=5 nodelay;
  proxy_pass http://platform_core/v1/inquiries/;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 30s;
}

# Verifactu module — SIF / facturación verificable (AEAT). Portal-facing
# reads/writes scoped por (appId, tenantId) en query/body (sin login todavía).
location /api/verifactu/ {
  limit_req zone=api burst=10 nodelay;
  proxy_pass http://platform_core/v1/verifactu/;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 30s;
}

# Chat module — member chat (direct / group / support). The /ws location is
# the real-time WebSocket gateway and MUST carry the Upgrade/Connection headers
# + a long read timeout so the socket isn't closed on idle. It is matched
# BEFORE the generic /api/chat/ location so the upgrade headers apply.
location /api/chat/ws {
  proxy_pass http://platform_core/v1/chat/ws;
  proxy_http_version 1.1;
  proxy_set_header Upgrade           $http_upgrade;
  proxy_set_header Connection        "upgrade";
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 3600s;
}

location /api/chat/ {
  limit_req zone=api burst=20 nodelay;
  proxy_pass http://platform_core/v1/chat/;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
