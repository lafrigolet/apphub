# Shared platform routes — include this inside every app server block
# Usage: include /etc/nginx/snippets/platform-routes.conf;

# OpenAPI docs (Swagger UI) — public, exposes the spec for all platform-core modules
location /docs {
  proxy_pass http://platform_core;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

location /api/auth/ {
  limit_req zone=api burst=20 nodelay;
  proxy_pass http://platform_core/v1/auth/;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 30s;
}

location /api/payments/webhooks/stripe {
  proxy_pass http://platform_core/v1/webhooks/stripe;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header Stripe-Signature  $http_stripe_signature;
}

