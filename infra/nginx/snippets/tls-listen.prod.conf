# TLS listener — PRODUCTION.
#
# Activated by docker-compose.prod.yml, which volume-mounts this file on
# top of the dev stub at /etc/nginx/snippets/tls-listen.conf. The same
# include in every server block now adds a TLS listener on :443 with
# the Cloudflare Origin Certificate.
#
# Required on the host:
#   /etc/cloudflare/origin/cert.pem  (mode 0644)
#   /etc/cloudflare/origin/key.pem   (mode 0600, owner root)
# Mounted read-only at the same path inside the container.
#
# Cert generation: SSL/TLS → Origin Server → Create Certificate in
# Cloudflare. Hostnames: `hulkstein.com, *.hulkstein.com`. ECDSA key,
# 15-year validity. Only valid for traffic coming FROM Cloudflare to
# this origin; useless for general client TLS.

listen 443 ssl http2;

ssl_certificate     /etc/cloudflare/origin/cert.pem;
ssl_certificate_key /etc/cloudflare/origin/key.pem;

# Modern TLS only — Cloudflare always negotiates 1.2 or 1.3 with the
# origin, so disabling older protocols on the origin is safe.
ssl_protocols             TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_session_cache         shared:SSL:10m;
ssl_session_timeout       1d;
ssl_session_tickets       off;
